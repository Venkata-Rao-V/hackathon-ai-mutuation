# ─────────────────────────────────────────────────────────────
# Prometheus scrape configuration
# "devcontainer" resolves on the mutation-net bridge network.
# The FastAPI service exposes OpenTelemetry Prometheus metrics at /metrics.
# ─────────────────────────────────────────────────────────────
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "core-mutation-service"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["devcontainer:8000"]
