name: AI Mutation Testing CI

run-name: >-
  AI Mutation Testing (${{ github.event_name == 'workflow_dispatch' &&
  format('manual | branch={0} | scope={1}', inputs.target_branch, inputs.mutation_scope) ||
  github.ref_name }})

on:
  push:
    branches:
      - main
      - develop
      - feature/**
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      target_branch:
        description: "Branch to run"
        required: true
        type: choice
        default: main
        options:
          - main
          - develop

      mutation_scope:
        description: "Folder to scan for Python mutation targets"
        required: true
        type: string
        default: agent

      run_lint:
        description: "Run lint stage"
        required: true
        type: boolean
        default: true

      run_unit_tests:
        description: "Run Python unit tests"
        required: true
        type: boolean
        default: true

      run_c_tests:
        description: "Run C compile & test"
        required: true
        type: boolean
        default: true

      run_cpp_tests:
        description: "Run C++ compile & test"
        required: true
        type: boolean
        default: true

      run_api_service:
        description: "Run FastAPI smoke test"
        required: true
        type: boolean
        default: true

      run_grafana:
        description: "Run Grafana dashboard stage"
        required: true
        type: boolean
        default: true

      run_mutation:
        description: "Run mutation testing"
        required: true
        type: boolean
        default: true

      run_e2e:
        description: "Run full E2E orchestration"
        required: true
        type: boolean
        default: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  PYTHON_VERSION: "3.11"
  SERVICE_URL: "http://127.0.0.1:8000"
  GRAFANA_URL: "http://127.0.0.1:3000"
  GRAFANA_USER: "admin"
  GRAFANA_PASSWORD: "admin"

jobs:
  # ─────────────────────────────────────────────────────────────
  # JOB 1 — Lint & Static Analysis
  # ─────────────────────────────────────────────────────────────
  lint:
    name: "1 · Lint & Static Analysis"
    runs-on: ubuntu-latest
    continue-on-error: true
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.run_lint }}

    steps:
      - name: Checkout repository (manual run)
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_branch }}
          fetch-depth: 1

      - name: Checkout repository (push / PR)
        if: ${{ github.event_name != 'workflow_dispatch' }}
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Debug trigger inputs
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "ref_name=${{ github.ref_name }}"
          echo "head_ref=${{ github.head_ref }}"
          echo "target_branch=${{ github.event_name == 'workflow_dispatch' && inputs.target_branch || 'auto' }}"
          echo "mutation_scope=${{ github.event_name == 'workflow_dispatch' && inputs.mutation_scope || 'agent' }}"

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install lint tools
        run: |
          pip install flake8 flake8-bugbear flake8-html

      - name: Generate flake8 HTML report
        run: |
          mkdir -p reports/flake8-html

          PY_FILES=$(find agent -type f -name '*.py' | sort | tr '\n' ' ')
          ROOT_PY=$(find . -maxdepth 1 -type f -name '*.py' | sort | tr '\n' ' ')

          if [ -z "$PY_FILES$ROOT_PY" ]; then
            cat > reports/flake8-html/index.html <<'EOF'
            <!DOCTYPE html>
            <html>
            <head><meta charset="utf-8"><title>Flake8 Report</title></head>
            <body><h1>No Python files found to lint.</h1></body>
            </html>
            EOF
            exit 0
          fi

          flake8 $PY_FILES $ROOT_PY \
            --max-line-length=120 \
            --extend-ignore=E203,W503,E501,W293,E261,E302,E305,E201,E202,F401,B007,E127 \
            --format=html \
            --htmldir=reports/flake8-html \
            --statistics || true

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flake8-html
          path: reports/flake8-html/
          if-no-files-found: warn

  # ─────────────────────────────────────────────────────────────
  # JOB 2 — Python Unit Tests
  # ─────────────────────────────────────────────────────────────
  unit_tests:
    name: "2 · Python Unit Tests"
    runs-on: ubuntu-latest
    needs: lint
    if: ${{ always() && (github.event_name != 'workflow_dispatch' || inputs.run_unit_tests) }}

    outputs:
      total: ${{ steps.metrics.outputs.total }}
      passed: ${{ steps.metrics.outputs.passed }}
      failed: ${{ steps.metrics.outputs.failed }}
      errors: ${{ steps.metrics.outputs.errors }}
      skipped: ${{ steps.metrics.outputs.skipped }}

    steps:
      - name: Checkout repository (manual run)
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_branch }}
          fetch-depth: 1

      - name: Checkout repository (push / PR)
        if: ${{ github.event_name != 'workflow_dispatch' }}
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest-html junit2html

      - name: Create reports directory
        run: mkdir -p reports

      - name: Discover Python test files
        run: |
          find agent -type f \( -name 'test_*.py' -o -name '*_test.py' \) | sort > reports/pytest-files.txt
          echo "Discovered Python test files:"
          cat reports/pytest-files.txt || true

      - name: Run pytest and generate HTML report
        shell: bash
        run: |
          set +e

          if [ ! -s reports/pytest-files.txt ]; then
            echo "No Python test files found under agent/"
            cat > reports/pytest-report.html <<'EOF'
            <!DOCTYPE html>
            <html>
            <head><meta charset="utf-8"><title>Pytest Report</title></head>
            <body><h1>No Python test files found under agent/</h1></body>
            </html>
            EOF
            echo "0" > reports/pytest-exit-code.txt
            exit 0
          fi

          TEST_FILES=$(tr '\n' ' ' < reports/pytest-files.txt)
          python -m pytest $TEST_FILES \
            -v \
            --tb=short \
            --junitxml=reports/pytest-results.xml \
            --html=reports/pytest-report.html \
            --self-contained-html \
            --no-header

          echo "$?" > reports/pytest-exit-code.txt
          set -e

      - name: Convert JUnit XML to HTML
        run: |
          if [ -f reports/pytest-results.xml ]; then
            junit2html reports/pytest-results.xml reports/pytest-junit-report.html || true
          else
            cat > reports/pytest-junit-report.html <<'EOF'
            <!DOCTYPE html>
            <html>
            <head><meta charset="utf-8"><title>JUnit Report</title></head>
            <body><h1>No JUnit XML generated.</h1></body>
            </html>
            EOF
          fi

      - name: Parse pytest metrics
        id: metrics
        run: |
          python - <<'PY'
          import os
          import xml.etree.ElementTree as ET

          total = passed = failed = errors = skipped = 0

          xml_file = "reports/pytest-results.xml"
          if os.path.exists(xml_file):
              root = ET.parse(xml_file).getroot()
              suites = [root] if root.tag == "testsuite" else root.findall("testsuite")
              for suite in suites:
                  total += int(suite.attrib.get("tests", 0))
                  failed += int(suite.attrib.get("failures", 0))
                  errors += int(suite.attrib.get("errors", 0))
                  skipped += int(suite.attrib.get("skipped", 0))

          passed = max(total - failed - errors - skipped, 0)

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
              f.write(f"total={total}\n")
              f.write(f"passed={passed}\n")
              f.write(f"failed={failed}\n")
              f.write(f"errors={errors}\n")
              f.write(f"skipped={skipped}\n")
          PY

      - name: Upload pytest report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-html
          path: |
            reports/pytest-report.html
            reports/pytest-junit-report.html
          if-no-files-found: warn

  # ─────────────────────────────────────────────────────────────
  # JOB 3A — C Compile & Test
  # ─────────────────────────────────────────────────────────────
  c_tests:
    name: "3A · C Compile & Test"
    runs-on: ubuntu-latest
    needs: lint
    continue-on-error: true
    if: ${{ always() && (github.event_name != 'workflow_dispatch' || inputs.run_c_tests) }}

    outputs:
      files: ${{ steps.metrics.outputs.files }}
      compile_pass: ${{ steps.metrics.outputs.compile_pass }}
      compile_fail: ${{ steps.metrics.outputs.compile_fail }}
      run_pass: ${{ steps.metrics.outputs.run_pass }}
      run_fail: ${{ steps.metrics.outputs.run_fail }}

    steps:
      - name: Checkout repository (manual run)
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_branch }}
          fetch-depth: 1

      - name: Checkout repository (push / PR)
        if: ${{ github.event_name != 'workflow_dispatch' }}
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y gcc make

      - name: Create reports directory
        run: mkdir -p reports

      - name: Discover C test files
        working-directory: agent
        run: |
          find . -type f -name 'test_*.c' | sort > ../reports/c-test-files.txt
          echo "Discovered C test files:"
          cat ../reports/c-test-files.txt || true

      - name: Compile and run C tests
        id: metrics
        working-directory: agent
        shell: bash
        run: |
          set +e
          LOG="../reports/c-build.log"
          : > "$LOG"

          FILES=0
          COMPILE_PASS=0
          COMPILE_FAIL=0
          RUN_PASS=0
          RUN_FAIL=0

          if [ ! -s ../reports/c-test-files.txt ]; then
            echo "No C test files discovered." | tee -a "$LOG"
          else
            while read -r TEST_FILE; do
              [ -z "$TEST_FILE" ] && continue
              FILES=$((FILES + 1))

              BASENAME=$(basename "$TEST_FILE")
              STEM="${BASENAME#test_}"
              STEM="${STEM%.c}"
              DIR=$(dirname "$TEST_FILE")

              SRC=""
              if [ -f "$DIR/${STEM}.c" ]; then
                SRC="$DIR/${STEM}.c"
              fi

              OUT="$DIR/${STEM}_c_test"

              echo "========================================" | tee -a "$LOG"
              echo "C TEST FILE : $TEST_FILE" | tee -a "$LOG"
              echo "C SOURCE    : ${SRC:-<none>}" | tee -a "$LOG"
              echo "OUTPUT      : $OUT" | tee -a "$LOG"

              if [ -n "$SRC" ]; then
                gcc -std=c11 -Wall -I. -o "$OUT" "$SRC" "$TEST_FILE" >> "$LOG" 2>&1
              else
                gcc -std=c11 -Wall -I. -o "$OUT" "$TEST_FILE" >> "$LOG" 2>&1
              fi

              if [ $? -eq 0 ]; then
                COMPILE_PASS=$((COMPILE_PASS + 1))
                echo "[BUILD PASS] $TEST_FILE" | tee -a "$LOG"
                "$OUT" >> "$LOG" 2>&1
                if [ $? -eq 0 ]; then
                  RUN_PASS=$((RUN_PASS + 1))
                  echo "[RUN PASS] $OUT" | tee -a "$LOG"
                else
                  RUN_FAIL=$((RUN_FAIL + 1))
                  echo "[RUN FAIL] $OUT" | tee -a "$LOG"
                fi
              else
                COMPILE_FAIL=$((COMPILE_FAIL + 1))
                echo "[BUILD FAIL] $TEST_FILE" | tee -a "$LOG"
              fi
            done < ../reports/c-test-files.txt
          fi

          {
            echo "files=$FILES"
            echo "compile_pass=$COMPILE_PASS"
            echo "compile_fail=$COMPILE_FAIL"
            echo "run_pass=$RUN_PASS"
            echo "run_fail=$RUN_FAIL"
          } >> "$GITHUB_OUTPUT"

      - name: Generate C HTML report
        run: |
          python - <<'PY'
          import html
          from pathlib import Path

          log_path = Path("reports/c-build.log")
          content = log_path.read_text(encoding="utf-8", errors="ignore") if log_path.exists() else "No C build log found."

          report = f"""<!DOCTYPE html>
          <html>
          <head>
            <meta charset="utf-8">
            <title>C Build Report</title>
            <style>
              body {{ font-family: Arial, sans-serif; margin: 24px; }}
              pre {{
                background: #111827;
                color: #f9fafb;
                padding: 16px;
                border-radius: 8px;
                white-space: pre-wrap;
              }}
            </style>
          </head>
          <body>
            <h1>C Build & Test Report</h1>
            <pre>{html.escape(content)}</pre>
          </body>
          </html>"""
          Path("reports/c-report.html").write_text(report, encoding="utf-8")
          PY

      - name: Upload C report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: c-html
          path: |
            reports/c-build.log
            reports/c-report.html
          if-no-files-found: warn

  # ─────────────────────────────────────────────────────────────
  # JOB 3B — C++ Compile & Test
  # ─────────────────────────────────────────────────────────────
  cpp_tests:
    name: "3B · C++ Compile & Test"
    runs-on: ubuntu-latest
    needs: lint
    continue-on-error: true
    if: ${{ always() && (github.event_name != 'workflow_dispatch' || inputs.run_cpp_tests) }}

    outputs:
      files: ${{ steps.metrics.outputs.files }}
      compile_pass: ${{ steps.metrics.outputs.compile_pass }}
      compile_fail: ${{ steps.metrics.outputs.compile_fail }}
      run_pass: ${{ steps.metrics.outputs.run_pass }}
      run_fail: ${{ steps.metrics.outputs.run_fail }}

    steps:
      - name: Checkout repository (manual run)
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_branch }}
          fetch-depth: 1

      - name: Checkout repository (push / PR)
        if: ${{ github.event_name != 'workflow_dispatch' }}
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y g++ make

      - name: Create reports directory
        run: mkdir -p reports

      - name: Discover C++ test files
        working-directory: agent
        run: |
          find . -type f \( -name 'test_*.cpp' -o -name 'test_*.cc' \) | sort > ../reports/cpp-test-files.txt
          echo "Discovered C++ test files:"
          cat ../reports/cpp-test-files.txt || true

      - name: Compile and run C++ tests
        id: metrics
        working-directory: agent
        shell: bash
        run: |
          set +e
          LOG="../reports/cpp-build.log"
          : > "$LOG"

          FILES=0
          COMPILE_PASS=0
          COMPILE_FAIL=0
          RUN_PASS=0
          RUN_FAIL=0

          if [ ! -s ../reports/cpp-test-files.txt ]; then
            echo "No C++ test files discovered." | tee -a "$LOG"
          else
            while read -r TEST_FILE; do
              [ -z "$TEST_FILE" ] && continue
              FILES=$((FILES + 1))

              BASENAME=$(basename "$TEST_FILE")
              STEM="${BASENAME#test_}"
              STEM="${STEM%.*}"
              EXT="${BASENAME##*.}"
              DIR=$(dirname "$TEST_FILE")

              SRC=""
              if [ -f "$DIR/${STEM}.${EXT}" ]; then
                SRC="$DIR/${STEM}.${EXT}"
              elif [ -f "$DIR/${STEM}.cpp" ]; then
                SRC="$DIR/${STEM}.cpp"
              elif [ -f "$DIR/${STEM}.cc" ]; then
                SRC="$DIR/${STEM}.cc"
              fi

              OUT="$DIR/${STEM}_cpp_test"

              echo "========================================" | tee -a "$LOG"
              echo "C++ TEST FILE: $TEST_FILE" | tee -a "$LOG"
              echo "C++ SOURCE   : ${SRC:-<none>}" | tee -a "$LOG"
              echo "OUTPUT       : $OUT" | tee -a "$LOG"

              if [ -n "$SRC" ]; then
                g++ -std=c++17 -Wall -I. -o "$OUT" "$SRC" "$TEST_FILE" >> "$LOG" 2>&1
              else
                g++ -std=c++17 -Wall -I. -o "$OUT" "$TEST_FILE" >> "$LOG" 2>&1
              fi

              if [ $? -eq 0 ]; then
                COMPILE_PASS=$((COMPILE_PASS + 1))
                echo "[BUILD PASS] $TEST_FILE" | tee -a "$LOG"
                "$OUT" >> "$LOG" 2>&1
                if [ $? -eq 0 ]; then
                  RUN_PASS=$((RUN_PASS + 1))
                  echo "[RUN PASS] $OUT" | tee -a "$LOG"
                else
                  RUN_FAIL=$((RUN_FAIL + 1))
                  echo "[RUN FAIL] $OUT" | tee -a "$LOG"
                fi
              else
                COMPILE_FAIL=$((COMPILE_FAIL + 1))
                echo "[BUILD FAIL] $TEST_FILE" | tee -a "$LOG"
              fi
            done < ../reports/cpp-test-files.txt
          fi

          {
            echo "files=$FILES"
            echo "compile_pass=$COMPILE_PASS"
            echo "compile_fail=$COMPILE_FAIL"
            echo "run_pass=$RUN_PASS"
            echo "run_fail=$RUN_FAIL"
          } >> "$GITHUB_OUTPUT"

      - name: Generate C++ HTML report
        run: |
          python - <<'PY'
          import html
          from pathlib import Path

          log_path = Path("reports/cpp-build.log")
          content = log_path.read_text(encoding="utf-8", errors="ignore") if log_path.exists() else "No C++ build log found."

          report = f"""<!DOCTYPE html>
          <html>
          <head>
            <meta charset="utf-8">
            <title>C++ Build Report</title>
            <style>
              body {{ font-family: Arial, sans-serif; margin: 24px; }}
              pre {{
                background: #111827;
                color: #f9fafb;
                padding: 16px;
                border-radius: 8px;
                white-space: pre-wrap;
              }}
            </style>
          </head>
          <body>
            <h1>C++ Build & Test Report</h1>
            <pre>{html.escape(content)}</pre>
          </body>
          </html>"""
          Path("reports/cpp-report.html").write_text(report, encoding="utf-8")
          PY

      - name: Upload C++ report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cpp-html
          path: |
            reports/cpp-build.log
            reports/cpp-report.html
          if-no-files-found: warn

  # ─────────────────────────────────────────────────────────────
  # JOB 4 — FastAPI Service Smoke Test
  # ─────────────────────────────────────────────────────────────
  api_service:
    name: "4 · FastAPI Service Health & Smoke"
    runs-on: ubuntu-latest
    needs: unit_tests
    if: ${{ always() && (github.event_name != 'workflow_dispatch' || inputs.run_api_service) }}

    steps:
      - name: Checkout repository (manual run)
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_branch }}
          fetch-depth: 1

      - name: Checkout repository (push / PR)
        if: ${{ github.event_name != 'workflow_dispatch' }}
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create reports directory
        run: mkdir -p reports

      - name: Discover one Python source and one Python test for API smoke
        id: discover
        shell: bash
        run: |
          SOURCE_FILE=$(find agent -type f -name '*.py' \
            ! -name 'test_*.py' \
            ! -name '*_test.py' \
            ! -name '__init__.py' \
            ! -name 'conftest.py' | sort | head -n 1)

          TEST_FILE=$(find agent -type f \( -name 'test_*.py' -o -name '*_test.py' \) | sort | head -n 1)

          echo "source_file=$SOURCE_FILE" >> "$GITHUB_OUTPUT"
          echo "test_file=$TEST_FILE" >> "$GITHUB_OUTPUT"

          echo "Discovered source: $SOURCE_FILE"
          echo "Discovered test:   $TEST_FILE"

      - name: Start FastAPI service in background
        working-directory: agent/services
        run: |
          nohup python core_mutation_service.py > ../../reports/fastapi.log 2>&1 &
          echo "SERVICE_PID=$!" >> $GITHUB_ENV

      - name: Wait for service to be healthy
        run: |
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ env.SERVICE_URL }}/health" || true)
            if [ "$STATUS" = "200" ]; then
              echo "Service healthy after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Service did not start in time"
          cat reports/fastapi.log || true
          exit 1

      - name: Smoke test POST /mutate
        shell: bash
        run: |
          if [ -z "${{ steps.discover.outputs.source_file }}" ] || [ -z "${{ steps.discover.outputs.test_file }}" ]; then
            cat > reports/mutate-response.json <<'EOF'
            {"info": "Skipping /mutate smoke test because no source file or test file was discovered under agent/."}
            EOF
            exit 0
          fi

          curl -s -X POST "${{ env.SERVICE_URL }}/mutate" \
            -H "Content-Type: application/json" \
            -d "{
              \"source_file\": \"${{ steps.discover.outputs.source_file }}\",
              \"test_file\": \"${{ steps.discover.outputs.test_file }}\",
              \"language\": \"python\"
            }" > reports/mutate-response.json

      - name: Smoke test GET /sessions
        run: |
          curl -s "${{ env.SERVICE_URL }}/sessions" > reports/sessions-response.json

      - name: Generate API HTML report
        run: |
          python - <<'PY'
          import json
          import html
          from pathlib import Path

          def read_json(path):
              p = Path(path)
              if not p.exists():
                  return {"error": f"{path} not found"}
              try:
                  return json.loads(p.read_text(encoding="utf-8"))
              except Exception as e:
                  return {"error": str(e)}

          mutate = read_json("reports/mutate-response.json")
          sessions = read_json("reports/sessions-response.json")
          fastapi_log = Path("reports/fastapi.log").read_text(encoding="utf-8", errors="ignore") if Path("reports/fastapi.log").exists() else "No FastAPI log found."

          report = f"""<!DOCTYPE html>
          <html>
          <head>
            <meta charset="utf-8">
            <title>FastAPI Smoke Report</title>
            <style>
              body {{ font-family: Arial, sans-serif; margin: 24px; }}
              pre {{ background: #111827; color: #f9fafb; padding: 16px; border-radius: 8px; white-space: pre-wrap; }}
            </style>
          </head>
          <body>
            <h1>FastAPI Smoke Test Report</h1>
            <h2>POST /mutate</h2>
            <pre>{html.escape(json.dumps(mutate, indent=2))}</pre>
            <h2>GET /sessions</h2>
            <pre>{html.escape(json.dumps(sessions, indent=2))}</pre>
            <h2>FastAPI Log</h2>
            <pre>{html.escape(fastapi_log)}</pre>
          </body>
          </html>"""
          Path("reports/api-report.html").write_text(report, encoding="utf-8")
          PY

      - name: Upload API report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-html
          path: |
            reports/api-report.html
          if-no-files-found: warn

      - name: Terminate FastAPI service
        if: always()
        run: kill $SERVICE_PID || true

  # ─────────────────────────────────────────────────────────────
  # JOB 5 — Mutation Testing
  # ─────────────────────────────────────────────────────────────
  mutation_run:
    name: "5 · Mutation Testing (mutmut + AI Agents)"
    runs-on: ubuntu-latest
    needs:
      - unit_tests
      - c_tests
      - cpp_tests
    if: ${{ always() && (github.event_name != 'workflow_dispatch' || inputs.run_mutation) }}

    outputs:
      killed: ${{ steps.metrics.outputs.killed }}
      survived: ${{ steps.metrics.outputs.survived }}
      timeout: ${{ steps.metrics.outputs.timeout }}
      suspicious: ${{ steps.metrics.outputs.suspicious }}
      no_tests: ${{ steps.metrics.outputs.no_tests }}
      considered: ${{ steps.metrics.outputs.considered }}
      mutation_score: ${{ steps.metrics.outputs.mutation_score }}

    steps:
      - name: Checkout repository (manual run)
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_branch }}
          fetch-depth: 1

      - name: Checkout repository (push / PR)
        if: ${{ github.event_name != 'workflow_dispatch' }}
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install mutmut pytest

      - name: Create reports directory
        run: |
          mkdir -p reports
          mkdir -p reports/mutmut-report

      - name: Discover Python mutation candidates
        run: |
          SCOPE="${{ github.event_name == 'workflow_dispatch' && inputs.mutation_scope || 'agent' }}"
          find "$SCOPE" -type f -name '*.py' \
            ! -name 'test_*.py' \
            ! -name '*_test.py' \
            ! -name '__init__.py' \
            ! -name 'conftest.py' | sort > reports/mutation-candidates.txt || true

          echo "Discovered mutation candidates:"
          cat reports/mutation-candidates.txt || true

      - name: Generate mutmut config dynamically
        run: |
          python - <<'PY'
          from pathlib import Path
          import os

          scope = "${{ github.event_name == 'workflow_dispatch' && inputs.mutation_scope || 'agent' }}"
          test_file_list = Path("reports/pytest-files.txt")
          cfg_lines = ["[mutmut]"]
          cfg_lines.append("source_paths=")
          cfg_lines.append(f"    {scope}")
          cfg_lines.append("pytest_add_cli_args_test_selection=")

          test_txt = Path("reports/pytest-files.txt")
          if test_txt.exists() and test_txt.read_text(encoding="utf-8").strip():
              for line in test_txt.read_text(encoding="utf-8").splitlines():
                  line = line.strip()
                  if line:
                      cfg_lines.append(f"    {line}")
          else:
              cfg_lines.append("    agent")

          cfg_lines.append("do_not_mutate=")
          cfg_lines.append("    */test_*.py")
          cfg_lines.append("    */*_test.py")
          cfg_lines.append("    */__init__.py")
          cfg_lines.append("    */conftest.py")

          Path("setup.cfg").write_text("\n".join(cfg_lines) + "\n", encoding="utf-8")
          print(Path("setup.cfg").read_text(encoding="utf-8"))
          PY

      - name: Run mutmut
        shell: bash
        run: |
          set +e

          if [ ! -s reports/mutation-candidates.txt ]; then
            echo "No mutation candidates discovered." > reports/mutmut-results.txt
            cat > reports/mutation-summary.html <<'EOF'
            <!DOCTYPE html>
            <html>
            <head><meta charset="utf-8"><title>Mutation Summary</title></head>
            <body><h1>No mutation candidates discovered.</h1></body>
            </html>
            EOF
            mkdir -p reports/mutmut-report
            cat > reports/mutmut-report/index.html <<'EOF'
            <!DOCTYPE html>
            <html>
            <head><meta charset="utf-8"><title>Mutmut HTML</title></head>
            <body><h1>No mutation candidates discovered.</h1></body>
            </html>
            EOF
            exit 0
          fi

          mutmut run
          mutmut results --all > reports/mutmut-results.txt 2>&1 || true
          mutmut html || true

          if [ -d html ]; then
            cp -r html/* reports/mutmut-report/ || true
          fi

          if [ -n "${{ secrets.OPENAI_API_KEY }}" ]; then
            cd agent
            python run_agents.py || true
            cd ..
          else
            echo "OPENAI_API_KEY not set — skipping AI agent stage." >> reports/mutmut-results.txt
          fi

          set -e

      - name: Parse real mutmut score
        id: metrics
        run: |
          python - <<'PY'
          import os
          from collections import Counter

          results_file = "reports/mutmut-results.txt"
          statuses = Counter({
              "killed": 0,
              "survived": 0,
              "timeout": 0,
              "suspicious": 0,
              "skipped": 0,
              "no tests": 0,
              "not checked": 0,
              "segfault": 0
          })

          if os.path.exists(results_file):
              with open(results_file, encoding="utf-8", errors="ignore") as f:
                  for raw in f:
                      line = raw.strip().lower()
                      if not line:
                          continue
                      for status in list(statuses.keys()):
                          if line.endswith(status) or f": {status}" in line:
                              statuses[status] += 1
                              break

          considered = (
              statuses["killed"]
              + statuses["survived"]
              + statuses["timeout"]
              + statuses["suspicious"]
              + statuses["no tests"]
              + statuses["segfault"]
          )
          mutation_score = round((statuses["killed"] / considered) * 100, 2) if considered else 0.0

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
              f.write(f"killed={statuses['killed']}\n")
              f.write(f"survived={statuses['survived']}\n")
              f.write(f"timeout={statuses['timeout']}\n")
              f.write(f"suspicious={statuses['suspicious']}\n")
              f.write(f"no_tests={statuses['no tests']}\n")
              f.write(f"considered={considered}\n")
              f.write(f"mutation_score={mutation_score}\n")
          PY

      - name: Generate mutation summary HTML
        run: |
          python - <<'PY'
          import html
          from pathlib import Path

          summary = Path("reports/mutmut-results.txt").read_text(encoding="utf-8", errors="ignore") if Path("reports/mutmut-results.txt").exists() else "No mutmut summary found."

          report = f"""<!DOCTYPE html>
          <html>
          <head>
            <meta charset="utf-8">
            <title>Mutation Summary</title>
            <style>
              body {{ font-family: Arial, sans-serif; margin: 24px; }}
              pre {{ background: #111827; color: #f9fafb; padding: 16px; border-radius: 8px; white-space: pre-wrap; }}
            </style>
          </head>
          <body>
            <h1>Mutation Testing Summary</h1>
            <pre>{html.escape(summary)}</pre>
          </body>
          </html>"""
          Path("reports/mutation-summary.html").write_text(report, encoding="utf-8")
          PY

      - name: Upload mutation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutation-html
          path: |
            reports/mutation-summary.html
            reports/mutmut-report/
          if-no-files-found: warn

  # ─────────────────────────────────────────────────────────────
  # JOB 6 — Grafana Dashboard
  # ─────────────────────────────────────────────────────────────
  grafana_update:
    name: "6 · Grafana Dashboard"
    runs-on: ubuntu-latest
    needs:
      - unit_tests
      - c_tests
      - cpp_tests
      - mutation_run
    continue-on-error: true
    if: ${{ always() && (github.event_name != 'workflow_dispatch' || inputs.run_grafana) }}

    steps:
      - name: Checkout repository (manual run)
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_branch }}
          fetch-depth: 1

      - name: Checkout repository (push / PR)
        if: ${{ github.event_name != 'workflow_dispatch' }}
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Create reports directory
        run: mkdir -p reports

      - name: Start Grafana container
        run: |
          docker run -d --name grafana \
            -p 3000:3000 \
            -e GF_SECURITY_ADMIN_USER=${{ env.GRAFANA_USER }} \
            -e GF_SECURITY_ADMIN_PASSWORD=${{ env.GRAFANA_PASSWORD }} \
            -e GF_AUTH_ANONYMOUS_ENABLED=true \
            -e GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer \
            -e GF_AUTH_DISABLE_LOGIN_FORM=true \
            grafana/grafana:latest

      - name: Wait for Grafana to be healthy
        run: |
          for i in $(seq 1 60); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ env.GRAFANA_URL }}/api/health" || true)
            if [ "$STATUS" = "200" ]; then
              echo "Grafana healthy after ${i}s"
              exit 0
            fi
            sleep 2
          done
          docker logs grafana || true
          exit 1

      - name: Create dashboard from real metrics
        run: |
          cat > reports/grafana-dashboard.json <<EOF
          {
            "dashboard": {
              "id": null,
              "uid": "ai-mutation-dashboard",
              "title": "AI Mutation Dashboard",
              "tags": ["ci", "mutation", "grafana"],
              "timezone": "browser",
              "schemaVersion": 39,
              "version": 1,
              "refresh": "10s",
              "panels": [
                {
                  "id": 1,
                  "type": "text",
                  "title": "Pipeline Metrics",
                  "gridPos": { "h": 18, "w": 24, "x": 0, "y": 0 },
                  "options": {
                    "mode": "markdown",
                    "content": "## AI Mutation Testing Dashboard\n\n**Pytest**\n- Total: **${{ needs.unit_tests.outputs.total }}**\n- Passed: **${{ needs.unit_tests.outputs.passed }}**\n- Failed: **${{ needs.unit_tests.outputs.failed }}**\n- Errors: **${{ needs.unit_tests.outputs.errors }}**\n- Skipped: **${{ needs.unit_tests.outputs.skipped }}**\n\n**C**\n- Files: **${{ needs.c_tests.outputs.files }}**\n- Compile pass: **${{ needs.c_tests.outputs.compile_pass }}**\n- Compile fail: **${{ needs.c_tests.outputs.compile_fail }}**\n- Run pass: **${{ needs.c_tests.outputs.run_pass }}**\n- Run fail: **${{ needs.c_tests.outputs.run_fail }}**\n\n**C++**\n- Files: **${{ needs.cpp_tests.outputs.files }}**\n- Compile pass: **${{ needs.cpp_tests.outputs.compile_pass }}**\n- Compile fail: **${{ needs.cpp_tests.outputs.compile_fail }}**\n- Run pass: **${{ needs.cpp_tests.outputs.run_pass }}**\n- Run fail: **${{ needs.cpp_tests.outputs.run_fail }}**\n\n**Mutation**\n- Killed: **${{ needs.mutation_run.outputs.killed }}**\n- Survived: **${{ needs.mutation_run.outputs.survived }}**\n- No tests: **${{ needs.mutation_run.outputs.no_tests }}**\n- Timeout: **${{ needs.mutation_run.outputs.timeout }}**\n- Suspicious: **${{ needs.mutation_run.outputs.suspicious }}**\n- Considered: **${{ needs.mutation_run.outputs.considered }}**\n- Real Mutation Score: **${{ needs.mutation_run.outputs.mutation_score }}%**"
                  }
                }
              ]
            },
            "overwrite": true
          }
          EOF

          curl -s -u "${{ env.GRAFANA_USER }}:${{ env.GRAFANA_PASSWORD }}" \
            -H "Content-Type: application/json" \
            -X POST "${{ env.GRAFANA_URL }}/api/dashboards/db" \
            --data @reports/grafana-dashboard.json > reports/grafana-create-response.json

      - name: Resolve dashboard URL
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          default_url = "http://127.0.0.1:3000/d/ai-mutation-dashboard/ai-mutation-dashboard?orgId=1&kiosk"

          p = Path("reports/grafana-create-response.json")
          if p.exists():
              try:
                  data = json.loads(p.read_text(encoding="utf-8"))
                  url = data.get("url")
                  if url:
                      print(f"DASHBOARD_URL=http://127.0.0.1:3000{url}?orgId=1&kiosk")
                  else:
                      print(f"DASHBOARD_URL={default_url}")
              except Exception:
                  print(f"DASHBOARD_URL={default_url}")
          else:
              print(f"DASHBOARD_URL={default_url}")
          PY >> $GITHUB_ENV

      - name: Install Playwright
        run: |
          npm init -y >/dev/null 2>&1 || true
          npm install playwright >/dev/null 2>&1
          npx playwright install --with-deps chromium

      - name: Capture Grafana screenshot
        env:
          DASHBOARD_URL: ${{ env.DASHBOARD_URL }}
        run: |
          node - <<'NODE'
          const { chromium } = require('playwright');

          (async () => {
            const browser = await chromium.launch({ headless: true });
            const page = await browser.newPage({ viewport: { width: 1600, height: 1200 } });

            const url = process.env.DASHBOARD_URL || 'http://127.0.0.1:3000/d/ai-mutation-dashboard/ai-mutation-dashboard?orgId=1&kiosk';
            await page.goto(url, { waitUntil: 'networkidle', timeout: 120000 });
            await page.waitForTimeout(5000);

            await page.screenshot({
              path: 'reports/grafana-dashboard.png',
              fullPage: true
            });

            await browser.close();
          })();
          NODE

      - name: Generate Grafana HTML report
        run: |
          python - <<'PY'
          from pathlib import Path

          report = """<!DOCTYPE html>
          <html>
          <head>
            <meta charset="utf-8">
            <title>Grafana Dashboard</title>
            <style>
              body { font-family: Arial, sans-serif; margin: 24px; }
              img { max-width: 100%; border: 1px solid #d1d5db; border-radius: 8px; }
            </style>
          </head>
          <body>
            <h1>Grafana Dashboard</h1>
            <p>Captured during workflow execution.</p>
            <img src="grafana-dashboard.png" alt="Grafana Dashboard Screenshot">
          </body>
          </html>"""

          Path("reports/grafana-report.html").write_text(report, encoding="utf-8")
          PY

      - name: Upload Grafana report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: grafana-html
          path: |
            reports/grafana-report.html
            reports/grafana-dashboard.png
          if-no-files-found: warn

      - name: Stop Grafana container
        if: always()
        run: |
          docker stop grafana || true
          docker rm grafana || true

  # ─────────────────────────────────────────────────────────────
  # JOB 7 — Full End-to-End Orchestration
  # ─────────────────────────────────────────────────────────────
  e2e_verify:
    name: "7 · Full E2E Orchestration (run_all.py)"
    runs-on: ubuntu-latest
    needs:
      - api_service
      - mutation_run
      - grafana_update
    if: ${{ always() && (github.event_name != 'workflow_dispatch' || inputs.run_e2e) }}

    steps:
      - name: Checkout repository (manual run)
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_branch }}
          fetch-depth: 1

      - name: Checkout repository (push / PR)
        if: ${{ github.event_name != 'workflow_dispatch' }}
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run full E2E orchestration
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python run_all.py || true

      - name: Create fallback E2E HTML if missing
        run: |
          if [ ! -f baseline-report.html ]; then
            cat > baseline-report.html <<'EOF'
            <!DOCTYPE html>
            <html>
            <head><meta charset="utf-8"><title>E2E Report</title></head>
            <body><h1>baseline-report.html was not generated.</h1></body>
            </html>
            EOF
          fi

      - name: Upload E2E report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-html
          path: baseline-report.html
          if-no-files-found: warn

  # ─────────────────────────────────────────────────────────────
  # JOB 8 — Final Combined HTML Report
  # ─────────────────────────────────────────────────────────────
  report:
    name: "8 · Final HTML Report"
    runs-on: ubuntu-latest
    needs:
      - lint
      - unit_tests
      - c_tests
      - cpp_tests
      - api_service
