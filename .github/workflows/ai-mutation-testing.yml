          </head>
          <body>
            <h1>AI Mutation Testing - Final HTML Report</h1>

            <div class="card">
              <h2>Quick Links</h2>
              <ul>
                <li><a href="assets/flake8-html/index.html">Lint HTML Report</a></li>
