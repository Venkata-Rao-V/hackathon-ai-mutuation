              <iframe src="assets/api-html/api-report.html"></iframe>
            </div>

            <div class="card">
              <h2>Mutation Summary Preview</h2>
              <iframe src="assets/mutation-html/mutation-summary.html"></iframe>
            </div>
          </body>
          </html>
          """

          Path("final-report/index.html").write_text(html, encoding="utf-8")
          PY

      - name: Upload final HTML report bundle
        uses: actions/upload-artifact@v4
        with:
          name: final-html-report
          path: final-report/
          if-no-files-found: warn

      - name: Write GitHub Step Summary
        run: |
          echo "## AI Mutation Testing - Final Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Final combined HTML report artifact: **final-html-report**" >> $GITHUB_STEP_SUMMARY
          echo "- Grafana is included as a visible screenshot inside the final HTML report." >> $GITHUB_STEP_SUMMARY
          echo "- Python, C, and C++ are executed in separate jobs." >> $GITHUB_STEP_SUMMARY
