name: AI Mutation Testing CI

run-name: >-
  AI Mutation Testing (${{ github.event_name == 'workflow_dispatch' &&
  format('manual | branch={0} | scope={1}', inputs.target_branch, inputs.mutation_scope) ||
  github.ref_name }})

on:
  push:
    branches:
      - main
      - develop
      - feature/**
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      target_branch:
        description: "Branch to run"
        required: true
        type: choice
        default: main
        options:
          - main
          - develop
      mutation_scope:
        description: "Folder to scan for Python mutation targets"
        required: true
        type: string
        default: agent
      run_c_tests:
        description: "Run C compile & test job"
        required: false
        type: boolean
        default: true
      run_cpp_tests:
        description: "Run C++ compile & test job"
        required: false
        type: boolean
        default: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  PYTHON_VERSION: "3.11"
  SERVICE_URL: "http://127.0.0.1:8000"
  GRAFANA_URL: "http://127.0.0.1:3000"
  GRAFANA_USER: "admin"
  GRAFANA_PASSWORD: "admin"

permissions:
  contents: read

jobs:
  # ─────────────────────────────────────────────────────────────
  # JOB 1 — Lint (non-blocking, report only)
  # ─────────────────────────────────────────────────────────────
  lint:
    name: "1 · Lint (Non-Blocking)"
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout repository (manual run)
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_branch }}
          fetch-depth: 1

      - name: Checkout repository (push / PR)
        if: ${{ github.event_name != 'workflow_dispatch' }}
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install flake8
        run: pip install flake8 flake8-bugbear flake8-html

      - name: Generate flake8 HTML report
        shell: bash
        run: |
          mkdir -p reports/flake8-html

          PY_FILES=$(find agent -type f -name '*.py' 2>/dev/null | sort | tr '\n' ' ')
          ROOT_PY=$(find . -maxdepth 1 -type f -name '*.py' 2>/dev/null | sort | tr '\n' ' ')

          if [ -z "$PY_FILES$ROOT_PY" ]; then
            python - <<'PY'
          from pathlib import Path
          Path("reports/flake8-html/index.html").write_text(
              """<!DOCTYPE html>
          <html><head><meta charset="utf-8"><title>Flake8 Report</title></head>
          <body><h1>No Python files found to lint.</h1></body></html>""",
              encoding="utf-8"
          )
          PY
            exit 0
          fi

          flake8 $PY_FILES $ROOT_PY \
            --max-line-length=120 \
            --extend-ignore=E203,W503,E501,W293,E261,E302,E305,E201,E202,F401,B007,E127 \
            --format=html \
            --htmldir=reports/flake8-html \
            --statistics || true

      - name: Upload flake8 report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flake8-html
          path: reports/flake8-html/
          if-no-files-found: warn

  # ─────────────────────────────────────────────────────────────
  # JOB 2 — Python Unit Tests
  # ─────────────────────────────────────────────────────────────
  unit_tests:
    name: "2 · Python Unit Tests"
    runs-on: ubuntu-latest
    needs: lint

    outputs:
      total: ${{ steps.metrics.outputs.total }}
      passed: ${{ steps.metrics.outputs.passed }}
      failed: ${{ steps.metrics.outputs.failed }}
      errors: ${{ steps.metrics.outputs.errors }}
      skipped: ${{ steps.metrics.outputs.skipped }}

    steps:
      - name: Checkout repository (manual run)
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_branch }}
          fetch-depth: 1

      - name: Checkout repository (push / PR)
        if: ${{ github.event_name != 'workflow_dispatch' }}
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-html junit2html

      - name: Create reports directory
        run: mkdir -p reports

      - name: Collect Python source & test files into reports/
        shell: bash
        run: |
          # Copy every .py file that will be exercised so it ships in the artifact
          mkdir -p reports/python-sources/agent
          find agent -type f -name '*.py' 2>/dev/null | while read f; do
            dest="reports/python-sources/$f"
            mkdir -p "$(dirname "$dest")"
            cp "$f" "$dest"
          done
          # Also list them for pytest
          find agent -type f \( -name 'test_*.py' -o -name '*_test.py' \) \
            | sort > reports/pytest-files.txt
          echo "=== Python test files discovered ==="
          cat reports/pytest-files.txt || true
          echo "=== Python source files discovered ==="
          find reports/python-sources -type f -name '*.py' | sort || true

      - name: Run pytest and generate HTML report
        shell: bash
        run: |
          set +e

          if [ ! -s reports/pytest-files.txt ]; then
            echo "No Python test files found under agent/"
            python - <<'PY'
          from pathlib import Path
          Path("reports/pytest-report.html").write_text(
              """<!DOCTYPE html>
          <html><head><meta charset="utf-8"><title>Pytest Report</title></head>
          <body><h1>No Python test files found under agent/</h1></body></html>""",
              encoding="utf-8"
          )
          PY
            echo "0" > reports/pytest-exit-code.txt
            exit 0
          fi

          TEST_FILES=$(tr '\n' ' ' < reports/pytest-files.txt)
          python -m pytest $TEST_FILES \
            -v \
            --tb=short \
            --junitxml=reports/pytest-results.xml \
            --html=reports/pytest-report.html \
            --self-contained-html \
            --no-header

          echo "$?" > reports/pytest-exit-code.txt
          set -e

      - name: Convert JUnit XML to HTML
        run: |
          if [ -f reports/pytest-results.xml ]; then
            junit2html reports/pytest-results.xml reports/pytest-junit-report.html || true
          else
            python - <<'PY'
          from pathlib import Path
          Path("reports/pytest-junit-report.html").write_text(
              """<!DOCTYPE html>
          <html><head><meta charset="utf-8"><title>JUnit Report</title></head>
          <body><h1>No JUnit XML generated.</h1></body></html>""",
              encoding="utf-8"
          )
          PY
          fi

      - name: Parse pytest metrics
        id: metrics
        run: |
          python - <<'PY'
          import os
          import xml.etree.ElementTree as ET

          total = passed = failed = errors = skipped = 0

          xml_file = "reports/pytest-results.xml"
          if os.path.exists(xml_file):
              root = ET.parse(xml_file).getroot()
              suites = [root] if root.tag == "testsuite" else root.findall("testsuite")
              for suite in suites:
                  total   += int(suite.attrib.get("tests",    0))
                  failed  += int(suite.attrib.get("failures", 0))
                  errors  += int(suite.attrib.get("errors",   0))
                  skipped += int(suite.attrib.get("skipped",  0))

          passed = max(total - failed - errors - skipped, 0)

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
              f.write(f"total={total}\n")
              f.write(f"passed={passed}\n")
              f.write(f"failed={failed}\n")
              f.write(f"errors={errors}\n")
              f.write(f"skipped={skipped}\n")
          PY

      # ── Artifact: HTML reports + raw XML + every .py file that ran ──
      - name: Upload pytest artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-test-results
          path: |
            reports/pytest-report.html
            reports/pytest-junit-report.html
            reports/pytest-results.xml
            reports/pytest-files.txt
            reports/python-sources/
          if-no-files-found: warn

  # ─────────────────────────────────────────────────────────────
  # JOB 3A — C Compile & Test
  # ─────────────────────────────────────────────────────────────
  c_tests:
    name: "3A · C Compile & Test"
    runs-on: ubuntu-latest
    needs: lint
    continue-on-error: true
    if: ${{ always() && (github.event_name != 'workflow_dispatch' || inputs.run_c_tests) }}

    outputs:
      files: ${{ steps.metrics.outputs.files }}
      compile_pass: ${{ steps.metrics.outputs.compile_pass }}
      compile_fail: ${{ steps.metrics.outputs.compile_fail }}
      run_pass: ${{ steps.metrics.outputs.run_pass }}
      run_fail: ${{ steps.metrics.outputs.run_fail }}

    steps:
      - name: Checkout repository (manual run)
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_branch }}
          fetch-depth: 1

      - name: Checkout repository (push / PR)
        if: ${{ github.event_name != 'workflow_dispatch' }}
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y gcc make

      - name: Create reports directory
        run: mkdir -p reports

      - name: Collect C source & test files into reports/
        shell: bash
        run: |
          # Copy every .c file (source + test) so they ship in the artifact
          mkdir -p reports/c-sources
          find agent -type f -name '*.c' 2>/dev/null | while read f; do
            dest="reports/c-sources/$(basename "$f")"
            cp "$f" "$dest"
          done
          find agent -type f -name '*.h' 2>/dev/null | while read f; do
            dest="reports/c-sources/$(basename "$f")"
            cp "$f" "$dest"
          done
          find agent -type f -name 'test_*.c' | sort > reports/c-test-files.txt
          echo "=== C files collected ==="
          ls reports/c-sources/ || true

      - name: Compile and run C tests
        id: metrics
        working-directory: agent
        shell: bash
        run: |
          set +e
          LOG="../reports/c-build.log"
          : > "$LOG"

          FILES=0; COMPILE_PASS=0; COMPILE_FAIL=0; RUN_PASS=0; RUN_FAIL=0

          if [ ! -s ../reports/c-test-files.txt ]; then
            echo "No C test files discovered." | tee -a "$LOG"
          else
            while read -r TEST_FILE; do
              [ -z "$TEST_FILE" ] && continue
              FILES=$((FILES + 1))

              BASENAME=$(basename "$TEST_FILE")
              STEM="${BASENAME#test_}"; STEM="${STEM%.c}"
              DIR=$(dirname "$TEST_FILE")
              SRC=""; [ -f "$DIR/${STEM}.c" ] && SRC="$DIR/${STEM}.c"
              OUT="$DIR/${STEM}_c_test"

              echo "========================================" | tee -a "$LOG"
              echo "C TEST FILE : $TEST_FILE"               | tee -a "$LOG"
              echo "C SOURCE    : ${SRC:-<none>}"           | tee -a "$LOG"
              echo "OUTPUT      : $OUT"                     | tee -a "$LOG"

              if [ -n "$SRC" ]; then
                gcc -std=c11 -Wall -I. -o "$OUT" "$SRC" "$TEST_FILE" >> "$LOG" 2>&1
              else
                gcc -std=c11 -Wall -I. -o "$OUT" "$TEST_FILE"        >> "$LOG" 2>&1
              fi

              if [ $? -eq 0 ]; then
                COMPILE_PASS=$((COMPILE_PASS + 1))
                echo "[BUILD PASS] $TEST_FILE" | tee -a "$LOG"
                "$OUT" >> "$LOG" 2>&1
                if [ $? -eq 0 ]; then
                  RUN_PASS=$((RUN_PASS + 1)); echo "[RUN PASS] $OUT"  | tee -a "$LOG"
                else
                  RUN_FAIL=$((RUN_FAIL + 1)); echo "[RUN FAIL] $OUT"  | tee -a "$LOG"
                fi
              else
                COMPILE_FAIL=$((COMPILE_FAIL + 1))
                echo "[BUILD FAIL] $TEST_FILE" | tee -a "$LOG"
              fi
            done < ../reports/c-test-files.txt
          fi

          {
            echo "files=$FILES"
            echo "compile_pass=$COMPILE_PASS"
            echo "compile_fail=$COMPILE_FAIL"
            echo "run_pass=$RUN_PASS"
            echo "run_fail=$RUN_FAIL"
          } >> "$GITHUB_OUTPUT"

      - name: Generate C HTML report
        run: |
          python - <<'PY'
          import html
          from pathlib import Path
          log_path = Path("reports/c-build.log")
          content = log_path.read_text(encoding="utf-8", errors="ignore") if log_path.exists() else "No C build log found."
          report = f"""<!DOCTYPE html>
          <html><head><meta charset="utf-8"><title>C Build Report</title>
          <style>body{{font-family:Arial,sans-serif;margin:24px}}
          pre{{background:#111827;color:#f9fafb;padding:16px;border-radius:8px;white-space:pre-wrap}}</style>
          </head><body><h1>C Build & Test Report</h1><pre>{html.escape(content)}</pre></body></html>"""
          Path("reports/c-report.html").write_text(report, encoding="utf-8")
          PY

      # ── Artifact: HTML report + raw log + every .c/.h file that compiled ──
      - name: Upload C artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: c-test-results
          path: |
            reports/c-report.html
            reports/c-build.log
            reports/c-test-files.txt
            reports/c-sources/
          if-no-files-found: warn

  # ─────────────────────────────────────────────────────────────
  # JOB 3B — C++ Compile & Test
  # ─────────────────────────────────────────────────────────────
  cpp_tests:
    name: "3B · C++ Compile & Test"
    runs-on: ubuntu-latest
    needs: lint
    continue-on-error: true
    if: ${{ always() && (github.event_name != 'workflow_dispatch' || inputs.run_cpp_tests) }}

    outputs:
      files: ${{ steps.metrics.outputs.files }}
      compile_pass: ${{ steps.metrics.outputs.compile_pass }}
      compile_fail: ${{ steps.metrics.outputs.compile_fail }}
      run_pass: ${{ steps.metrics.outputs.run_pass }}
      run_fail: ${{ steps.metrics.outputs.run_fail }}

    steps:
      - name: Checkout repository (manual run)
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_branch }}
          fetch-depth: 1

      - name: Checkout repository (push / PR)
        if: ${{ github.event_name != 'workflow_dispatch' }}
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y g++ make

      - name: Create reports directory
        run: mkdir -p reports

      - name: Collect C++ source & test files into reports/
        shell: bash
        run: |
          mkdir -p reports/cpp-sources
          find agent -type f \( -name '*.cpp' -o -name '*.cc' -o -name '*.h' -o -name '*.hpp' \) \
            2>/dev/null | while read f; do
            dest="reports/cpp-sources/$(basename "$f")"
            cp "$f" "$dest"
          done
          find agent -type f \( -name 'test_*.cpp' -o -name 'test_*.cc' \) \
            | sort > reports/cpp-test-files.txt
          echo "=== C++ files collected ==="
          ls reports/cpp-sources/ || true

      - name: Compile and run C++ tests
        id: metrics
        working-directory: agent
        shell: bash
        run: |
          set +e
          LOG="../reports/cpp-build.log"
          : > "$LOG"

          FILES=0; COMPILE_PASS=0; COMPILE_FAIL=0; RUN_PASS=0; RUN_FAIL=0

          if [ ! -s ../reports/cpp-test-files.txt ]; then
            echo "No C++ test files discovered." | tee -a "$LOG"
          else
            while read -r TEST_FILE; do
              [ -z "$TEST_FILE" ] && continue
              FILES=$((FILES + 1))

              BASENAME=$(basename "$TEST_FILE")
              STEM="${BASENAME#test_}"; STEM="${STEM%.*}"
              EXT="${BASENAME##*.}"; DIR=$(dirname "$TEST_FILE")

              SRC=""
              if   [ -f "$DIR/${STEM}.${EXT}" ]; then SRC="$DIR/${STEM}.${EXT}"
              elif [ -f "$DIR/${STEM}.cpp"     ]; then SRC="$DIR/${STEM}.cpp"
              elif [ -f "$DIR/${STEM}.cc"      ]; then SRC="$DIR/${STEM}.cc"
              fi
              OUT="$DIR/${STEM}_cpp_test"

              echo "========================================" | tee -a "$LOG"
              echo "C++ TEST FILE: $TEST_FILE"               | tee -a "$LOG"
              echo "C++ SOURCE   : ${SRC:-<none>}"           | tee -a "$LOG"
              echo "OUTPUT       : $OUT"                     | tee -a "$LOG"

              if [ -n "$SRC" ]; then
                g++ -std=c++17 -Wall -I. -o "$OUT" "$SRC" "$TEST_FILE" >> "$LOG" 2>&1
              else
                g++ -std=c++17 -Wall -I. -o "$OUT" "$TEST_FILE"        >> "$LOG" 2>&1
              fi

              if [ $? -eq 0 ]; then
                COMPILE_PASS=$((COMPILE_PASS + 1))
                echo "[BUILD PASS] $TEST_FILE" | tee -a "$LOG"
                "$OUT" >> "$LOG" 2>&1
                if [ $? -eq 0 ]; then
                  RUN_PASS=$((RUN_PASS + 1)); echo "[RUN PASS] $OUT"  | tee -a "$LOG"
                else
                  RUN_FAIL=$((RUN_FAIL + 1)); echo "[RUN FAIL] $OUT"  | tee -a "$LOG"
                fi
              else
                COMPILE_FAIL=$((COMPILE_FAIL + 1))
                echo "[BUILD FAIL] $TEST_FILE" | tee -a "$LOG"
              fi
            done < ../reports/cpp-test-files.txt
          fi

          {
            echo "files=$FILES"
            echo "compile_pass=$COMPILE_PASS"
            echo "compile_fail=$COMPILE_FAIL"
            echo "run_pass=$RUN_PASS"
            echo "run_fail=$RUN_FAIL"
          } >> "$GITHUB_OUTPUT"

      - name: Generate C++ HTML report
        run: |
          python - <<'PY'
          import html
          from pathlib import Path
          log_path = Path("reports/cpp-build.log")
          content = log_path.read_text(encoding="utf-8", errors="ignore") if log_path.exists() else "No C++ build log found."
          report = f"""<!DOCTYPE html>
          <html><head><meta charset="utf-8"><title>C++ Build Report</title>
          <style>body{{font-family:Arial,sans-serif;margin:24px}}
          pre{{background:#111827;color:#f9fafb;padding:16px;border-radius:8px;white-space:pre-wrap}}</style>
          </head><body><h1>C++ Build & Test Report</h1><pre>{html.escape(content)}</pre></body></html>"""
          Path("reports/cpp-report.html").write_text(report, encoding="utf-8")
          PY

      # ── Artifact: HTML report + raw log + every .cpp/.cc/.h file that compiled ──
      - name: Upload C++ artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cpp-test-results
          path: |
            reports/cpp-report.html
            reports/cpp-build.log
            reports/cpp-test-files.txt
            reports/cpp-sources/
          if-no-files-found: warn

  # ─────────────────────────────────────────────────────────────
  # JOB 4 — Python Mutation Testing (mutmut)
  # ─────────────────────────────────────────────────────────────
  mutation_tests:
    name: "4 · Mutation Testing"
    runs-on: ubuntu-latest
    needs: unit_tests
    continue-on-error: true

    outputs:
      killed: ${{ steps.metrics.outputs.killed }}
      survived: ${{ steps.metrics.outputs.survived }}
      timeout: ${{ steps.metrics.outputs.timeout }}
      total_mutants: ${{ steps.metrics.outputs.total_mutants }}
      mutation_score: ${{ steps.metrics.outputs.mutation_score }}

    steps:
      - name: Checkout repository (manual run)
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_branch }}
          fetch-depth: 1

      - name: Checkout repository (push / PR)
        if: ${{ github.event_name != 'workflow_dispatch' }}
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install mutmut pytest

      - name: Determine mutation scope
        id: scope
        run: |
          SCOPE="${{ github.event_name == 'workflow_dispatch' && inputs.mutation_scope || 'agent' }}"
          echo "scope=$SCOPE" >> "$GITHUB_OUTPUT"
          echo "Mutation scope: $SCOPE"

      - name: Run mutmut
        shell: bash
        run: |
          set +e
          mkdir -p reports/mutants

          SCOPE="${{ steps.scope.outputs.scope }}"

          SRC_FILES=$(find "$SCOPE" -type f -name '*.py' \
            ! -name 'test_*.py' ! -name '*_test.py' 2>/dev/null | sort | tr '\n' ' ')

          if [ -z "$SRC_FILES" ]; then
            echo "No Python source files found in $SCOPE to mutate."
            echo "0 0 0" > reports/mutmut-summary.txt
            exit 0
          fi

          TEST_FILES=$(find "$SCOPE" -type f \( -name 'test_*.py' -o -name '*_test.py' \) \
            2>/dev/null | sort | tr '\n' ' ')

          if [ -n "$TEST_FILES" ]; then
            mutmut run \
              --paths-to-mutate "$SCOPE" \
              --use-coverage \
              --test-command "python -m pytest $TEST_FILES -x -q" \
              2>&1 | tee reports/mutmut-run.log || true
          else
            mutmut run \
              --paths-to-mutate "$SCOPE" \
              2>&1 | tee reports/mutmut-run.log || true
          fi

          # Full mutant diff — one file per surviving mutant ID
          mutmut results 2>/dev/null | tee reports/mutmut-results.log || true
          mutmut junitxml > reports/mutmut-results.xml 2>/dev/null || true

          # Export every surviving mutant as an individual diff file
          SURVIVED_IDS=$(mutmut results 2>/dev/null \
            | grep -E '^[0-9]+' | awk '{print $1}' || true)
          if [ -n "$SURVIVED_IDS" ]; then
            for ID in $SURVIVED_IDS; do
              mutmut show "$ID" > "reports/mutants/mutant-${ID}.diff" 2>/dev/null || true
            done
          fi

          # Summary counts from run log
          KILLED=$(grep -c "\[KILLED\]"   reports/mutmut-run.log 2>/dev/null || echo 0)
          SURVIVED=$(grep -c "\[SURVIVED\]" reports/mutmut-run.log 2>/dev/null || echo 0)
          TIMEOUT=$(grep -c "\[TIMEOUT\]"  reports/mutmut-run.log 2>/dev/null || echo 0)
          echo "$KILLED $SURVIVED $TIMEOUT" > reports/mutmut-summary.txt
          set -e

      - name: Parse mutation metrics
        id: metrics
        run: |
          python - <<'PY'
          import os, re
          from pathlib import Path

          killed = survived = timeout = 0

          summary = Path("reports/mutmut-summary.txt")
          if summary.exists():
              parts = summary.read_text().split()
              if len(parts) >= 3:
                  killed, survived, timeout = int(parts[0]), int(parts[1]), int(parts[2])

          run_log = Path("reports/mutmut-run.log")
          if run_log.exists():
              text = run_log.read_text()
              for pattern, key in [
                  (r"(\d+) killed",    "killed"),
                  (r"(\d+) survived",  "survived"),
                  (r"(\d+) timed out", "timeout"),
              ]:
                  m = re.search(pattern, text, re.IGNORECASE)
                  if m:
                      if key == "killed":   killed   = int(m.group(1))
                      if key == "survived": survived = int(m.group(1))
                      if key == "timeout":  timeout  = int(m.group(1))

          total = killed + survived + timeout
          score = round((killed / total) * 100, 2) if total > 0 else 0.0

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
              f.write(f"killed={killed}\n")
              f.write(f"survived={survived}\n")
              f.write(f"timeout={timeout}\n")
              f.write(f"total_mutants={total}\n")
              f.write(f"mutation_score={score}\n")

          print(f"Mutants: killed={killed}, survived={survived}, timeout={timeout}, score={score}%")
          PY

      - name: Generate mutation HTML report
        run: |
          python - <<'PY'
          import html, os
          from pathlib import Path

          run_text     = Path("reports/mutmut-run.log").read_text(errors="ignore")     if Path("reports/mutmut-run.log").exists()     else "No run log."
          results_text = Path("reports/mutmut-results.log").read_text(errors="ignore") if Path("reports/mutmut-results.log").exists() else "No results."

          # Build a table of per-mutant diffs
          mutant_rows = ""
          diff_dir = Path("reports/mutants")
          diffs = sorted(diff_dir.glob("mutant-*.diff")) if diff_dir.exists() else []
          for diff_file in diffs:
              mid = diff_file.stem.replace("mutant-", "")
              diff_content = diff_file.read_text(errors="ignore")
              mutant_rows += f"""
              <details>
                <summary>Mutant #{mid}</summary>
                <pre>{html.escape(diff_content)}</pre>
              </details>"""

          if not mutant_rows:
              mutant_rows = "<p>No surviving mutants — all mutants were killed ✓</p>"

          report = f"""<!DOCTYPE html>
          <html><head><meta charset="utf-8"><title>Mutation Testing Report</title>
          <style>
            body{{font-family:Arial,sans-serif;margin:24px}}
            pre{{background:#111827;color:#f9fafb;padding:16px;border-radius:8px;
                 white-space:pre-wrap;overflow-x:auto;font-size:13px}}
            details{{margin:8px 0;border:1px solid #d1d5db;border-radius:6px;padding:4px 12px}}
            summary{{cursor:pointer;font-weight:600;padding:6px 0}}
            h2{{margin-top:32px;border-bottom:1px solid #e5e7eb;padding-bottom:6px}}
          </style></head><body>
          <h1>Mutation Testing Report</h1>
          <h2>Run log</h2><pre>{html.escape(run_text)}</pre>
          <h2>Results summary</h2><pre>{html.escape(results_text)}</pre>
          <h2>Surviving mutant diffs</h2>{mutant_rows}
          </body></html>"""

          Path("reports/mutation-report.html").write_text(report, encoding="utf-8")
          PY

      # ── Artifact: HTML report + XML + logs + every surviving mutant diff ──
      - name: Upload mutation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutation-test-results
          path: |
            reports/mutation-report.html
            reports/mutmut-results.xml
            reports/mutmut-run.log
            reports/mutmut-results.log
            reports/mutmut-summary.txt
            reports/mutants/
          if-no-files-found: warn

