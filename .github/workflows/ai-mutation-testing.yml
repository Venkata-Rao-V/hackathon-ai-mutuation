          cp -r all-reports/flake8-html final-report/assets/ || true
          cp -r all-reports/pytest-html final-report/assets/ || true
          cp -r all-reports/c-html final-report/assets/ || true
          cp -r all-reports/cpp-html final-report/assets/ || true
          cp -r all-reports/api-html final-report/assets/ || true
          cp -r all-reports/grafana-html final-report/assets/ || true
          cp -r all-reports/mutation-html final-report/assets/ || true
          cp -r all-reports/e2e-html final-report/assets/ || true

      - name: Ensure placeholder screenshot exists if Grafana artifact missing
        run: |
          if [ ! -f final-report/assets/grafana-html/grafana-dashboard.png ]; then
