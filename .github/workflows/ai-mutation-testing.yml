name: AI Mutation Testing CI

on:
  push:
    branches:
      - main
      - develop
      - feature/**
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.11"
  SERVICE_URL: "http://127.0.0.1:8000"
  GRAFANA_URL: "http://127.0.0.1:3000"
  GRAFANA_USER: "admin"
  GRAFANA_PASSWORD: "admin"

jobs:

  # ─────────────────────────────────────────────────────────────
  # JOB 1 — Lint & Static Analysis (non-blocking)
  # ─────────────────────────────────────────────────────────────
  lint:
    name: "1 · Lint & Static Analysis"
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Debug trigger
        run: |
          echo "Branch: ${{ github.ref }}"
          echo "Event: ${{ github.event_name }}"

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install lint tools
        run: pip install flake8 flake8-bugbear

      - name: Run flake8 (report only, non-blocking)
        run: |
          mkdir -p reports
          flake8 agent/services/ agent/*.py run_all.py \
            --max-line-length=120 \
            --extend-ignore=E203,W503,E501,W293,E261,E302,E305,E201,E202,F401,B007,E127 \
            --statistics | tee reports/flake8-report.txt || true

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flake8-report
          path: reports/flake8-report.txt

  # ─────────────────────────────────────────────────────────────
  # JOB 2 — Python Unit Tests (pytest)
  # ─────────────────────────────────────────────────────────────
  unit-tests:
    name: "2 · Python Unit Tests"
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Create reports directory
        run: mkdir -p reports

      - name: Run pytest (Python test suite)
        working-directory: agent
        run: |
          pytest \
            test_hello.py \
            test_sample_mutation.py \
            -v \
            --tb=short \
            --junitxml=../reports/pytest-results.xml \
            --no-header

      - name: Upload pytest results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results
          path: reports/pytest-results.xml

  # ─────────────────────────────────────────────────────────────
  # JOB 3 — C / C++ Compile & Test
  # ─────────────────────────────────────────────────────────────
  cpp-tests:
    name: "3 · C / C++ Compile & Test"
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y g++ gcc make

      - name: Compile sample_mutation.cpp
        working-directory: agent
        run: g++ -std=c++17 -Wall -o sample_mutation_cpp sample_mutation.cpp

      - name: Compile sample_mutation.c
        working-directory: agent
        run: gcc -Wall -o sample_mutation_c sample_mutation.c

      - name: Compile sample.c
        working-directory: agent
        run: gcc -Wall -o sample_c sample.c

      - name: Run C++ smoke binary
        working-directory: agent
        run: ./sample_mutation_cpp && echo "C++ binary OK"

      - name: Run C smoke binary
        working-directory: agent
        run: ./sample_mutation_c && echo "C binary OK"

  # ─────────────────────────────────────────────────────────────
  # JOB 4 — FastAPI Service Smoke Test
  # ─────────────────────────────────────────────────────────────
  api-service:
    name: "4 · FastAPI Service Health & Smoke"
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Start FastAPI service in background
        working-directory: agent/services
        run: |
          nohup python core_mutation_service.py > ../../fastapi.log 2>&1 &
          echo "SERVICE_PID=$!" >> $GITHUB_ENV

      - name: Wait for service to be healthy (max 30 s)
        run: |
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" ${{ env.SERVICE_URL }}/health || true)
            if [ "$STATUS" = "200" ]; then
              echo "✅ Service is healthy after ${i}s"
              exit 0
            fi
            echo "Attempt $i/30 — waiting..."
            sleep 1
          done
          echo "❌ Service did not start in time"
          echo "------ FastAPI log ------"
          cat fastapi.log || true
          exit 1

      - name: Smoke test — POST /mutate (Python hello.py)
        run: |
          curl -s -X POST "${{ env.SERVICE_URL }}/mutate" \
            -H "Content-Type: application/json" \
            -d '{
              "source_file": "agent/hello.py",
              "test_file": "agent/test_hello.py",
              "language": "python"
            }' | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          print('Response:', json.dumps(data, indent=2))
          assert 'session_id' in data or 'error' not in data, f'Unexpected error: {data}'
          print('✅ /mutate endpoint responded correctly')
          "

      - name: Smoke test — GET /sessions
        run: |
          curl -s "${{ env.SERVICE_URL }}/sessions" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          print('Sessions:', json.dumps(data, indent=2))
          print('✅ /sessions endpoint OK')
          "

      - name: Upload FastAPI log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fastapi-log
          path: fastapi.log

      - name: Terminate FastAPI service
        if: always()
        run: kill $SERVICE_PID || true

  # ─────────────────────────────────────────────────────────────
  # JOB 5 — Grafana Setup / Dashboard Update
  # ─────────────────────────────────────────────────────────────
  grafana-update:
    name: "5 · Grafana Dashboard Update"
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start Grafana container
        run: |
          docker run -d --name grafana \
            -p 3000:3000 \
            -e GF_SECURITY_ADMIN_USER=${{ env.GRAFANA_USER }} \
            -e GF_SECURITY_ADMIN_PASSWORD=${{ env.GRAFANA_PASSWORD }} \
            grafana/grafana:latest

      - name: Wait for Grafana to be healthy
        run: |
          for i in $(seq 1 60); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" ${{ env.GRAFANA_URL }}/api/health || true)
            if [ "$STATUS" = "200" ]; then
              echo "✅ Grafana is healthy after ${i}s"
              exit 0
            fi
            echo "Attempt $i/60 — waiting for Grafana..."
            sleep 2
          done
          echo "❌ Grafana did not start in time"
          docker logs grafana || true
          exit 1

      - name: Create reports directory
        run: mkdir -p reports

      - name: Create dashboard JSON
        run: |
          cat > reports/grafana-dashboard.json <<'EOF'
          {
            "dashboard": {
              "id": null,
              "uid": "ai-mutation-dashboard",
              "title": "AI Mutation Testing Dashboard",
              "tags": ["ci", "mutation", "grafana"],
              "timezone": "browser",
              "schemaVersion": 39,
              "version": 1,
              "refresh": "10s",
              "panels": [
                {
                  "id": 1,
                  "type": "stat",
                  "title": "Pipeline Status",
                  "gridPos": {
                    "h": 4,
                    "w": 6,
                    "x": 0,
                    "y": 0
                  },
                  "targets": [],
                  "options": {
                    "reduceOptions": {
                      "values": false,
                      "calcs": ["lastNotNull"],
                      "fields": ""
                    },
                    "orientation": "auto",
                    "textMode": "auto",
                    "colorMode": "value",
                    "graphMode": "none",
                    "justifyMode": "auto"
                  }
                },
                {
                  "id": 2,
                  "type": "text",
                  "title": "Mutation Testing Summary",
                  "gridPos": {
                    "h": 8,
                    "w": 12,
                    "x": 6,
                    "y": 0
                  },
                  "options": {
                    "mode": "markdown",
                    "content": "## AI Mutation Testing CI\nThis dashboard is automatically created/updated by GitHub Actions.\n\n- Lint\n- Unit Tests\n- C/C++ Tests\n- API Smoke Tests\n- Mutation Run\n- E2E Verification"
                  }
                }
              ]
            },
            "overwrite": true
          }
          EOF

      - name: Create or update Grafana dashboard
        run: |
          curl -s -u "${{ env.GRAFANA_USER }}:${{ env.GRAFANA_PASSWORD }}" \
            -H "Content-Type: application/json" \
            -X POST "${{ env.GRAFANA_URL }}/api/dashboards/db" \
            --data @reports/grafana-dashboard.json | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          print(json.dumps(data, indent=2))
          if data.get('status') not in ('success', None):
              raise SystemExit('Grafana dashboard update failed')
          print('✅ Grafana dashboard created/updated successfully')
          "

      - name: Export Grafana health response
        run: |
          curl -s -u "${{ env.GRAFANA_USER }}:${{ env.GRAFANA_PASSWORD }}" \
            "${{ env.GRAFANA_URL }}/api/health" > reports/grafana-health.json
          cat reports/grafana-health.json

      - name: Upload Grafana artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: grafana-artifacts
          path: reports/

      - name: Stop Grafana container
        if: always()
        run: |
          docker stop grafana || true
          docker rm grafana || true

  # ─────────────────────────────────────────────────────────────
  # JOB 6 — Mutation Testing (mutmut + AI agent pipeline)
  # ─────────────────────────────────────────────────────────────
  mutation-run:
    name: "6 · Mutation Testing (mutmut + AI Agents)"
    runs-on: ubuntu-latest
    needs: [unit-tests, cpp-tests]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create reports directory
        run: mkdir -p reports

      - name: Run mutmut on hello.py
        working-directory: agent
        run: |
          mutmut run \
            --paths-to-mutate hello.py \
            --tests-dir . \
            --runner "python -m pytest" \
          || true

      - name: Export mutmut HTML report
        working-directory: agent
        run: |
          mutmut html || true
          mkdir -p ../reports
          cp -r html ../reports/mutmut-report || true

      - name: Display mutmut summary
        working-directory: agent
        run: mutmut results || true

      - name: Run AI Agent pipeline (run_agents.py)
        working-directory: agent
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -n "$OPENAI_API_KEY" ]; then
            echo "🤖 OPENAI_API_KEY present — running AI agents..."
            python run_agents.py
          else
            echo "⚠️ OPENAI_API_KEY not set — skipping AI agent stage."
            echo "Add the secret in: Settings -> Secrets -> OPENAI_API_KEY"
          fi

      - name: Upload mutation reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutation-reports
          path: reports/

  # ─────────────────────────────────────────────────────────────
  # JOB 7 — Full End-to-End Orchestration (run_all.py)
  # ─────────────────────────────────────────────────────────────
  e2e-verify:
    name: "7 · Full E2E Orchestration (run_all.py)"
    runs-on: ubuntu-latest
    needs: [api-service, mutation-run, grafana-update]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run full E2E orchestration
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python run_all.py

      - name: Upload E2E HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-baseline-report
          path: baseline-report.html

  # ─────────────────────────────────────────────────────────────
  # JOB 8 — Publish Summary
  # ─────────────────────────────────────────────────────────────
  report:
    name: "8 · Summary & Report"
    runs-on: ubuntu-latest
    needs:
      - lint
      - unit-tests
      - cpp-tests
      - api-service
      - grafana-update
      - mutation-run
      - e2e-verify
    if: always()

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-reports

      - name: Write job summary to GitHub Step Summary
        run: |
          echo "## 🧬 AI Mutation Testing — Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| 1 · Lint | ${{ needs.lint.result == 'success' && '✅ Passed' || '⚠️ Needs Cleanup' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 2 · Unit Tests | ${{ needs.unit-tests.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 3 · C/C++ Tests | ${{ needs.cpp-tests.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 4 · API Service | ${{ needs.api-service.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 5 · Grafana Update | ${{ needs.grafana-update.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 6 · Mutation Run | ${{ needs.mutation-run.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 7 · E2E Verify | ${{ needs.e2e-verify.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> Artifacts (flake8 report, pytest XML, FastAPI log, mutmut HTML report, Grafana dashboard JSON, baseline-report.html) are attached to this run." >> $GITHUB_STEP_SUMMARY

      - name: List downloaded artifacts
        run: find all-reports -type f | sort
