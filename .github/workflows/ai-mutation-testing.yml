name: AI Mutation Testing CI
run-name: >-
  AI Mutation Testing (${{ github.event_name == 'workflow_dispatch' &&
  format('manual | branch={0} | scope={1} | langs={2}', inputs.target_branch, inputs.mutation_scope, inputs.mutation_languages) ||
  github.ref_name }})
on:
  push:
    branches:
      - main
      - develop
      - feature/**
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      target_branch:
        description: "Branch to run"
        required: true
        type: choice
        default: main
        options:
          - main
          - develop
      mutation_scope:
        description: "Folder to scan for Python mutation targets"
        required: true
        type: string
        default: agent
      mutation_languages:
        description: "Languages to run mutation testing on"
        required: true
        type: choice
        default: "all"
        options:
          - all
          - python
          - c
          - cpp
          - python,c
          - python,cpp
          - c,cpp
      run_c_tests:
        description: "Run C compile & test job"
        required: false
        type: boolean
        default: true
      run_cpp_tests:
        description: "Run C++ compile & test job"
        required: false
        type: boolean
        default: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  PYTHON_VERSION: "3.11"
  SERVICE_URL: "http://127.0.0.1:8000"
  GRAFANA_URL: "http://127.0.0.1:3000"
  GRAFANA_USER: "admin"
  GRAFANA_PASSWORD: "admin"

permissions:
  contents: read

jobs:
  # ─────────────────────────────────────────────────────────────
  # JOB 1 — Lint (non-blocking, report only)
  # ─────────────────────────────────────────────────────────────
  lint:
    name: "1 · Lint (Non-Blocking)"
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout repository (manual run)
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_branch }}
          fetch-depth: 1
      - name: Checkout repository (push / PR)
        if: ${{ github.event_name != 'workflow_dispatch' }}
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install flake8
        run: pip install flake8 flake8-bugbear flake8-html
      - name: Generate flake8 HTML report
        shell: bash
        run: |
          mkdir -p reports/flake8-html
          PY_FILES=$(find agent -type f -name '*.py' 2>/dev/null | sort | tr '\n' ' ')
          ROOT_PY=$(find . -maxdepth 1 -type f -name '*.py' 2>/dev/null | sort | tr '\n' ' ')
          if [ -z "$PY_FILES$ROOT_PY" ]; then
            python - <<'PY'
          from pathlib import Path
          Path("reports/flake8-html/index.html").write_text(
              """<!DOCTYPE html>
          <html><head><meta charset="utf-8"><title>Flake8 Report</title></head>
          <body><h1>No Python files found to lint.</h1></body></html>""",
              encoding="utf-8"
          )
          PY
            exit 0
          fi
          flake8 $PY_FILES $ROOT_PY \
            --max-line-length=120 \
            --extend-ignore=E203,W503,E501,W293,E261,E302,E305,E201,E202,F401,B007,E127 \
            --format=html \
            --htmldir=reports/flake8-html \
            --statistics || true
      - name: Upload flake8 report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flake8-html
          path: reports/flake8-html/
          if-no-files-found: warn

  # ─────────────────────────────────────────────────────────────
  # JOB 2 — Python Unit Tests
  # ─────────────────────────────────────────────────────────────
  unit_tests:
    name: "2 · Python Unit Tests"
    runs-on: ubuntu-latest
    needs: lint
    outputs:
      total: ${{ steps.metrics.outputs.total }}
      passed: ${{ steps.metrics.outputs.passed }}
      failed: ${{ steps.metrics.outputs.failed }}
      errors: ${{ steps.metrics.outputs.errors }}
      skipped: ${{ steps.metrics.outputs.skipped }}
    steps:
      - name: Checkout repository (manual run)
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_branch }}
          fetch-depth: 1
      - name: Checkout repository (push / PR)
        if: ${{ github.event_name != 'workflow_dispatch' }}
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-html junit2html
      - name: Create reports directory
        run: mkdir -p reports
      - name: Collect Python source & test files into reports/
        shell: bash
        run: |
          mkdir -p reports/python-sources/agent
          find agent -type f -name '*.py' 2>/dev/null | while read f; do
            dest="reports/python-sources/$f"
            mkdir -p "$(dirname "$dest")"
            cp "$f" "$dest"
          done
          find agent -type f \( -name 'test_*.py' -o -name '*_test.py' \) \
            | sort > reports/pytest-files.txt
          echo "=== Python test files discovered ==="
          cat reports/pytest-files.txt || true
          echo "=== Python source files discovered ==="
          find reports/python-sources -type f -name '*.py' | sort || true
      - name: Run pytest and generate HTML report
        shell: bash
        run: |
          set +e
          if [ ! -s reports/pytest-files.txt ]; then
            echo "No Python test files found under agent/"
            python - <<'PY'
          from pathlib import Path
          Path("reports/pytest-report.html").write_text(
              """<!DOCTYPE html>
          <html><head><meta charset="utf-8"><title>Pytest Report</title></head>
          <body><h1>No Python test files found under agent/</h1></body></html>""",
              encoding="utf-8"
          )
          PY
            echo "0" > reports/pytest-exit-code.txt
            exit 0
          fi
          TEST_FILES=$(tr '\n' ' ' < reports/pytest-files.txt)
          python -m pytest $TEST_FILES \
            -v \
            --tb=short \
            --junitxml=reports/pytest-results.xml \
            --html=reports/pytest-report.html \
            --self-contained-html \
            --no-header
          echo "$?" > reports/pytest-exit-code.txt
          set -e
      - name: Convert JUnit XML to HTML
        run: |
          if [ -f reports/pytest-results.xml ]; then
            junit2html reports/pytest-results.xml reports/pytest-junit-report.html || true
          else
            python - <<'PY'
          from pathlib import Path
          Path("reports/pytest-junit-report.html").write_text(
              """<!DOCTYPE html>
          <html><head><meta charset="utf-8"><title>JUnit Report</title></head>
          <body><h1>No JUnit XML generated.</h1></body></html>""",
              encoding="utf-8"
          )
          PY
          fi
      - name: Parse pytest metrics
        id: metrics
        run: |
          python - <<'PY'
          import os
          import xml.etree.ElementTree as ET
          total = passed = failed = errors = skipped = 0
          xml_file = "reports/pytest-results.xml"
          if os.path.exists(xml_file):
              root = ET.parse(xml_file).getroot()
              suites = [root] if root.tag == "testsuite" else root.findall("testsuite")
              for suite in suites:
                  total   += int(suite.attrib.get("tests",    0))
                  failed  += int(suite.attrib.get("failures", 0))
                  errors  += int(suite.attrib.get("errors",   0))
                  skipped += int(suite.attrib.get("skipped",  0))
          passed = max(total - failed - errors - skipped, 0)
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
              f.write(f"total={total}\n")
              f.write(f"passed={passed}\n")
              f.write(f"failed={failed}\n")
              f.write(f"errors={errors}\n")
              f.write(f"skipped={skipped}\n")
          PY
      - name: Upload pytest artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-test-results
          path: |
            reports/pytest-report.html
            reports/pytest-junit-report.html
            reports/pytest-results.xml
            reports/pytest-files.txt
            reports/python-sources/
          if-no-files-found: warn

  # ─────────────────────────────────────────────────────────────
  # JOB 3A — C Compile & Test
  # ─────────────────────────────────────────────────────────────
  c_tests:
    name: "3A · C Compile & Test"
    runs-on: ubuntu-latest
    needs: lint
    continue-on-error: true
    if: ${{ always() && (github.event_name != 'workflow_dispatch' || inputs.run_c_tests) }}
    outputs:
      files: ${{ steps.metrics.outputs.files }}
      compile_pass: ${{ steps.metrics.outputs.compile_pass }}
      compile_fail: ${{ steps.metrics.outputs.compile_fail }}
      run_pass: ${{ steps.metrics.outputs.run_pass }}
      run_fail: ${{ steps.metrics.outputs.run_fail }}
    steps:
      - name: Checkout repository (manual run)
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_branch }}
          fetch-depth: 1
      - name: Checkout repository (push / PR)
        if: ${{ github.event_name != 'workflow_dispatch' }}
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Install build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y gcc make
      - name: Create reports directory
        run: mkdir -p reports
      - name: Collect C source & test files into reports/
        shell: bash
        run: |
          mkdir -p reports/c-sources
          find agent -type f -name '*.c' 2>/dev/null | while read f; do
            dest="reports/c-sources/$(basename "$f")"
            cp "$f" "$dest"
          done
          find agent -type f -name '*.h' 2>/dev/null | while read f; do
            dest="reports/c-sources/$(basename "$f")"
            cp "$f" "$dest"
          done
          find agent -type f -name 'test_*.c' | sort > reports/c-test-files.txt
          echo "=== C files collected ==="
          ls reports/c-sources/ || true
      - name: Compile and run C tests
        id: metrics
        working-directory: agent
        shell: bash
        run: |
          set +e
          LOG="../reports/c-build.log"
          : > "$LOG"
          FILES=0; COMPILE_PASS=0; COMPILE_FAIL=0; RUN_PASS=0; RUN_FAIL=0
          if [ ! -s ../reports/c-test-files.txt ]; then
            echo "No C test files discovered." | tee -a "$LOG"
          else
            while read -r TEST_FILE; do
              [ -z "$TEST_FILE" ] && continue
              FILES=$((FILES + 1))
              BASENAME=$(basename "$TEST_FILE")
              STEM="${BASENAME#test_}"; STEM="${STEM%.c}"
              DIR=$(dirname "$TEST_FILE")
              SRC=""; [ -f "$DIR/${STEM}.c" ] && SRC="$DIR/${STEM}.c"
              OUT="$DIR/${STEM}_c_test"
              echo "========================================" | tee -a "$LOG"
              echo "C TEST FILE : $TEST_FILE"               | tee -a "$LOG"
              echo "C SOURCE    : ${SRC:-<none>}"           | tee -a "$LOG"
              echo "OUTPUT      : $OUT"                     | tee -a "$LOG"
              if [ -n "$SRC" ]; then
                gcc -std=c11 -Wall -I. -o "$OUT" "$SRC" "$TEST_FILE" >> "$LOG" 2>&1
              else
                gcc -std=c11 -Wall -I. -o "$OUT" "$TEST_FILE"        >> "$LOG" 2>&1
              fi
              if [ $? -eq 0 ]; then
                COMPILE_PASS=$((COMPILE_PASS + 1))
                echo "[BUILD PASS] $TEST_FILE" | tee -a "$LOG"
                "$OUT" >> "$LOG" 2>&1
                if [ $? -eq 0 ]; then
                  RUN_PASS=$((RUN_PASS + 1)); echo "[RUN PASS] $OUT"  | tee -a "$LOG"
                else
                  RUN_FAIL=$((RUN_FAIL + 1)); echo "[RUN FAIL] $OUT"  | tee -a "$LOG"
                fi
              else
                COMPILE_FAIL=$((COMPILE_FAIL + 1))
                echo "[BUILD FAIL] $TEST_FILE" | tee -a "$LOG"
              fi
            done < ../reports/c-test-files.txt
          fi
          {
            echo "files=$FILES"
            echo "compile_pass=$COMPILE_PASS"
            echo "compile_fail=$COMPILE_FAIL"
            echo "run_pass=$RUN_PASS"
            echo "run_fail=$RUN_FAIL"
          } >> "$GITHUB_OUTPUT"
      - name: Generate C HTML report
        run: |
          python - <<'PY'
          import html
          from pathlib import Path
          log_path = Path("reports/c-build.log")
          content = log_path.read_text(encoding="utf-8", errors="ignore") if log_path.exists() else "No C build log found."
          report = f"""<!DOCTYPE html>
          <html><head><meta charset="utf-8"><title>C Build Report</title>
          <style>body{{font-family:Arial,sans-serif;margin:24px}}
          pre{{background:#111827;color:#f9fafb;padding:16px;border-radius:8px;white-space:pre-wrap}}</style>
          </head><body><h1>C Build & Test Report</h1><pre>{html.escape(content)}</pre></body></html>"""
          Path("reports/c-report.html").write_text(report, encoding="utf-8")
          PY
      - name: Upload C artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: c-test-results
          path: |
            reports/c-report.html
            reports/c-build.log
            reports/c-test-files.txt
            reports/c-sources/
          if-no-files-found: warn

  # ─────────────────────────────────────────────────────────────
  # JOB 3B — C++ Compile & Test
  # ─────────────────────────────────────────────────────────────
  cpp_tests:
    name: "3B · C++ Compile & Test"
    runs-on: ubuntu-latest
    needs: lint
    continue-on-error: true
    if: ${{ always() && (github.event_name != 'workflow_dispatch' || inputs.run_cpp_tests) }}
    outputs:
      files: ${{ steps.metrics.outputs.files }}
      compile_pass: ${{ steps.metrics.outputs.compile_pass }}
      compile_fail: ${{ steps.metrics.outputs.compile_fail }}
      run_pass: ${{ steps.metrics.outputs.run_pass }}
      run_fail: ${{ steps.metrics.outputs.run_fail }}
    steps:
      - name: Checkout repository (manual run)
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_branch }}
          fetch-depth: 1
      - name: Checkout repository (push / PR)
        if: ${{ github.event_name != 'workflow_dispatch' }}
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Install build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y g++ make
      - name: Create reports directory
        run: mkdir -p reports
      - name: Collect C++ source & test files into reports/
        shell: bash
        run: |
          mkdir -p reports/cpp-sources
          find agent -type f \( -name '*.cpp' -o -name '*.cc' -o -name '*.h' -o -name '*.hpp' \) \
            2>/dev/null | while read f; do
            dest="reports/cpp-sources/$(basename "$f")"
            cp "$f" "$dest"
          done
          find agent -type f \( -name 'test_*.cpp' -o -name 'test_*.cc' \) \
            | sort > reports/cpp-test-files.txt
          echo "=== C++ files collected ==="
          ls reports/cpp-sources/ || true
      - name: Compile and run C++ tests
        id: metrics
        working-directory: agent
        shell: bash
        run: |
          set +e
          LOG="../reports/cpp-build.log"
          : > "$LOG"
          FILES=0; COMPILE_PASS=0; COMPILE_FAIL=0; RUN_PASS=0; RUN_FAIL=0
          if [ ! -s ../reports/cpp-test-files.txt ]; then
            echo "No C++ test files discovered." | tee -a "$LOG"
          else
            while read -r TEST_FILE; do
              [ -z "$TEST_FILE" ] && continue
              FILES=$((FILES + 1))
              BASENAME=$(basename "$TEST_FILE")
              STEM="${BASENAME#test_}"; STEM="${STEM%.*}"
              EXT="${BASENAME##*.}"; DIR=$(dirname "$TEST_FILE")
              SRC=""
              if   [ -f "$DIR/${STEM}.${EXT}" ]; then SRC="$DIR/${STEM}.${EXT}"
              elif [ -f "$DIR/${STEM}.cpp"     ]; then SRC="$DIR/${STEM}.cpp"
              elif [ -f "$DIR/${STEM}.cc"      ]; then SRC="$DIR/${STEM}.cc"
              fi
              OUT="$DIR/${STEM}_cpp_test"
              echo "========================================" | tee -a "$LOG"
              echo "C++ TEST FILE: $TEST_FILE"               | tee -a "$LOG"
              echo "C++ SOURCE   : ${SRC:-<none>}"           | tee -a "$LOG"
              echo "OUTPUT       : $OUT"                     | tee -a "$LOG"
              if [ -n "$SRC" ]; then
                g++ -std=c++17 -Wall -I. -o "$OUT" "$SRC" "$TEST_FILE" >> "$LOG" 2>&1
              else
                g++ -std=c++17 -Wall -I. -o "$OUT" "$TEST_FILE"        >> "$LOG" 2>&1
              fi
              if [ $? -eq 0 ]; then
                COMPILE_PASS=$((COMPILE_PASS + 1))
                echo "[BUILD PASS] $TEST_FILE" | tee -a "$LOG"
                "$OUT" >> "$LOG" 2>&1
                if [ $? -eq 0 ]; then
                  RUN_PASS=$((RUN_PASS + 1)); echo "[RUN PASS] $OUT"  | tee -a "$LOG"
                else
                  RUN_FAIL=$((RUN_FAIL + 1)); echo "[RUN FAIL] $OUT"  | tee -a "$LOG"
                fi
              else
                COMPILE_FAIL=$((COMPILE_FAIL + 1))
                echo "[BUILD FAIL] $TEST_FILE" | tee -a "$LOG"
              fi
            done < ../reports/cpp-test-files.txt
          fi
          {
            echo "files=$FILES"
            echo "compile_pass=$COMPILE_PASS"
            echo "compile_fail=$COMPILE_FAIL"
            echo "run_pass=$RUN_PASS"
            echo "run_fail=$RUN_FAIL"
          } >> "$GITHUB_OUTPUT"
      - name: Generate C++ HTML report
        run: |
          python - <<'PY'
          import html
          from pathlib import Path
          log_path = Path("reports/cpp-build.log")
          content = log_path.read_text(encoding="utf-8", errors="ignore") if log_path.exists() else "No C++ build log found."
          report = f"""<!DOCTYPE html>
          <html><head><meta charset="utf-8"><title>C++ Build Report</title>
          <style>body{{font-family:Arial,sans-serif;margin:24px}}
          pre{{background:#111827;color:#f9fafb;padding:16px;border-radius:8px;white-space:pre-wrap}}</style>
          </head><body><h1>C++ Build & Test Report</h1><pre>{html.escape(content)}</pre></body></html>"""
          Path("reports/cpp-report.html").write_text(report, encoding="utf-8")
          PY
      - name: Upload C++ artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cpp-test-results
          path: |
            reports/cpp-report.html
            reports/cpp-build.log
            reports/cpp-test-files.txt
            reports/cpp-sources/
          if-no-files-found: warn

  # ─────────────────────────────────────────────────────────────
  # JOB 4 — Python Mutation Testing (mutmut)
  # Runs when: push/PR (always), or dispatch with python/all selected
  # ─────────────────────────────────────────────────────────────
  mutation_tests:
    name: "4 · Python Mutation Testing"
    runs-on: ubuntu-latest
    needs: unit_tests
    continue-on-error: true
    # On push/PR always run; on dispatch only when python or all is selected
    if: >-
      ${{
        always() && (
          github.event_name != 'workflow_dispatch' ||
          inputs.mutation_languages == 'all' ||
          contains(inputs.mutation_languages, 'python')
        )
      }}
    outputs:
      killed: ${{ steps.metrics.outputs.killed }}
      survived: ${{ steps.metrics.outputs.survived }}
      timeout: ${{ steps.metrics.outputs.timeout }}
      total_mutants: ${{ steps.metrics.outputs.total_mutants }}
      mutation_score: ${{ steps.metrics.outputs.mutation_score }}
    steps:
      - name: Checkout repository (manual run)
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_branch }}
          fetch-depth: 1
      - name: Checkout repository (push / PR)
        if: ${{ github.event_name != 'workflow_dispatch' }}
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install "mutmut>=2" pytest
      - name: Determine mutation scope
        id: scope
        run: |
          SCOPE="${{ github.event_name == 'workflow_dispatch' && inputs.mutation_scope || 'agent' }}"
          echo "scope=$SCOPE" >> "$GITHUB_OUTPUT"
          echo "Mutation scope: $SCOPE"
      - name: Write setup.cfg [mutmut] section
        shell: bash
        run: |
          SCOPE="${{ steps.scope.outputs.scope }}"
          SRC_PATHS=$(find "$SCOPE" -type f -name '*.py' \
            ! -name 'test_*.py' ! -name '*_test.py' 2>/dev/null \
            | xargs -I{} dirname {} | sort -u | tr '\n' ',' | sed 's/,$//')
          [ -z "$SRC_PATHS" ] && SRC_PATHS="$SCOPE"
          TEST_FILES=$(find "$SCOPE" -type f \( -name 'test_*.py' -o -name '*_test.py' \) \
            2>/dev/null | sort | tr '\n' ' ')
          if [ -n "$TEST_FILES" ]; then
            TEST_CMD="python -m pytest $TEST_FILES -x -q"
          else
            TEST_CMD="python -m pytest $SCOPE -x -q"
          fi
          if [ -f setup.cfg ]; then
            python3 - <<'PY'
          import re, pathlib
          text = pathlib.Path("setup.cfg").read_text()
          text = re.sub(r'\[mutmut\].*?(?=\[|\Z)', '', text, flags=re.DOTALL)
          pathlib.Path("setup.cfg").write_text(text.rstrip() + "\n")
          PY
          fi
          printf '\n[mutmut]\nsource_paths = %s\nrunner = %s\n' \
            "$SRC_PATHS" "$TEST_CMD" >> setup.cfg
          echo "=== setup.cfg [mutmut] section ==="
          grep -A5 '\[mutmut\]' setup.cfg || true
      - name: Run mutmut
        shell: bash
        run: |
          set +e
          mkdir -p reports/mutants
          SCOPE="${{ steps.scope.outputs.scope }}"
          SRC_FILES=$(find "$SCOPE" -type f -name '*.py' \
            ! -name 'test_*.py' ! -name '*_test.py' 2>/dev/null | sort)
          if [ -z "$SRC_FILES" ]; then
            echo "No Python source files found in $SCOPE to mutate."
            printf "killed=0\nsurvived=0\ntimeout=0\n" > reports/mutmut-counts.txt
            exit 0
          fi
          mutmut run 2>&1 | tee reports/mutmut-run.log || true
          mutmut results 2>/dev/null | tee reports/mutmut-results.log || true
          mutmut junitxml > reports/mutmut-results.xml 2>/dev/null || true

          # ── Robust count extraction: query mutmut's own result codes ──
          # mutmut exit codes: killed=0 survived/timeout=1, so query by status
          KILLED=$(mutmut result-ids killed 2>/dev/null | grep -c '[0-9]' || echo 0)
          SURVIVED=$(mutmut result-ids survived 2>/dev/null | grep -c '[0-9]' || echo 0)
          TIMEOUT=$(mutmut result-ids timeout 2>/dev/null | grep -c '[0-9]' || echo 0)

          # Fallback: parse the run log if result-ids is unavailable
          if [ "$KILLED" -eq 0 ] && [ "$SURVIVED" -eq 0 ] && [ "$TIMEOUT" -eq 0 ]; then
            KILLED=$(grep -oP '\d+(?=\s+killed)'       reports/mutmut-run.log 2>/dev/null | tail -1 || echo 0)
            SURVIVED=$(grep -oP '\d+(?=\s+survived)'   reports/mutmut-run.log 2>/dev/null | tail -1 || echo 0)
            TIMEOUT=$(grep -oP '\d+(?=\s+timed?\s*out)' reports/mutmut-run.log 2>/dev/null | tail -1 || echo 0)
            # Also try "⠸ 42/100  🎉 40  ⏰ 0  🤔 2  🙁 0" spinner format
            if [ -z "$KILLED" ] || [ "$KILLED" -eq 0 ]; then
              KILLED=$(grep -oP '🎉\s*\K\d+'   reports/mutmut-run.log 2>/dev/null | tail -1 || echo 0)
              SURVIVED=$(grep -oP '🙁\s*\K\d+' reports/mutmut-run.log 2>/dev/null | tail -1 || echo 0)
              TIMEOUT=$(grep -oP '⏰\s*\K\d+'  reports/mutmut-run.log 2>/dev/null | tail -1 || echo 0)
            fi
          fi
          KILLED=${KILLED:-0}; SURVIVED=${SURVIVED:-0}; TIMEOUT=${TIMEOUT:-0}
          printf "killed=%s\nsurvived=%s\ntimeout=%s\n" \
            "$KILLED" "$SURVIVED" "$TIMEOUT" > reports/mutmut-counts.txt
          echo "mutmut counts — killed=$KILLED survived=$SURVIVED timeout=$TIMEOUT"

          # Export surviving mutant diffs
          SURVIVED_IDS=$(mutmut result-ids survived 2>/dev/null || \
            grep -oP '(?<=Survived: )\d+' reports/mutmut-results.log 2>/dev/null | tr ',' '\n' | tr -d ' ' || true)
          for ID in $SURVIVED_IDS; do
            [ -z "$ID" ] && continue
            mutmut show "$ID" > "reports/mutants/mutant-${ID}.diff" 2>/dev/null || true
          done
          set -e

      - name: Parse mutation metrics
        id: metrics
        run: |
          python - <<'PY'
          import os, re
          from pathlib import Path

          killed = survived = timeout = 0

          # Primary: structured counts file written by the shell step
          counts_file = Path("reports/mutmut-counts.txt")
          if counts_file.exists():
              for line in counts_file.read_text().splitlines():
                  k, _, v = line.partition("=")
                  v = v.strip()
                  if not v.isdigit():
                      continue
                  if k == "killed":   killed   = int(v)
                  if k == "survived": survived = int(v)
                  if k == "timeout":  timeout  = int(v)

          # Secondary fallback: parse run log with multiple pattern styles
          if killed == 0 and survived == 0:
              run_log = Path("reports/mutmut-run.log")
              if run_log.exists():
                  text = run_log.read_text(errors="ignore")
                  # Pattern 1: "42 killed"  "3 survived"  "1 timed out"
                  for pat, key in [
                      (r"(\d+)\s+killed",        "killed"),
                      (r"(\d+)\s+survived",      "survived"),
                      (r"(\d+)\s+timed?\s*out",  "timeout"),
                  ]:
                      m = re.search(pat, text, re.IGNORECASE)
                      if m:
                          if key == "killed":   killed   = int(m.group(1))
                          if key == "survived": survived = int(m.group(1))
                          if key == "timeout":  timeout  = int(m.group(1))
                  # Pattern 2: mutmut spinner emoji format "🎉 40  ⏰ 0  🙁 2"
                  if killed == 0 and survived == 0:
                      for pat, key in [
                          (r"🎉\s*(\d+)", "killed"),
                          (r"🙁\s*(\d+)", "survived"),
                          (r"⏰\s*(\d+)", "timeout"),
                      ]:
                          m = re.search(pat, text)
                          if m:
                              if key == "killed":   killed   = int(m.group(1))
                              if key == "survived": survived = int(m.group(1))
                              if key == "timeout":  timeout  = int(m.group(1))

          total = killed + survived + timeout
          score = round((killed / total) * 100, 2) if total > 0 else 0.0

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
              f.write(f"killed={killed}\n")
              f.write(f"survived={survived}\n")
              f.write(f"timeout={timeout}\n")
              f.write(f"total_mutants={total}\n")
              f.write(f"mutation_score={score}\n")

          print(f"Python mutation — killed={killed}, survived={survived}, "
                f"timeout={timeout}, total={total}, score={score}%")
          PY

      - name: Generate mutation HTML report
        run: |
          python - <<'PY'
          import html, os
          from pathlib import Path
          run_text     = Path("reports/mutmut-run.log").read_text(errors="ignore")     if Path("reports/mutmut-run.log").exists()     else "No run log."
          results_text = Path("reports/mutmut-results.log").read_text(errors="ignore") if Path("reports/mutmut-results.log").exists() else "No results."
          mutant_rows = ""
          diff_dir = Path("reports/mutants")
          diffs = sorted(diff_dir.glob("mutant-*.diff")) if diff_dir.exists() else []
          for diff_file in diffs:
              mid = diff_file.stem.replace("mutant-", "")
              diff_content = diff_file.read_text(errors="ignore")
              mutant_rows += (
                  f"<details><summary>Mutant #{mid}</summary>"
                  f"<pre>{html.escape(diff_content)}</pre></details>"
              )
          if not mutant_rows:
              mutant_rows = "<p>No surviving mutants — all mutants were killed ✓</p>"
          report = f"""<!DOCTYPE html>
          <html><head><meta charset="utf-8"><title>Python Mutation Testing Report</title>
          <style>
            body{{font-family:Arial,sans-serif;margin:24px}}
            pre{{background:#111827;color:#f9fafb;padding:16px;border-radius:8px;
                 white-space:pre-wrap;overflow-x:auto;font-size:13px}}
            details{{margin:8px 0;border:1px solid #d1d5db;border-radius:6px;padding:4px 12px}}
            summary{{cursor:pointer;font-weight:600;padding:6px 0}}
            h2{{margin-top:32px;border-bottom:1px solid #e5e7eb;padding-bottom:6px}}
          </style></head><body>
          <h1>Python Mutation Testing Report</h1>
          <h2>Run log</h2><pre>{html.escape(run_text)}</pre>
          <h2>Results summary</h2><pre>{html.escape(results_text)}</pre>
          <h2>Surviving mutant diffs</h2>{mutant_rows}
          </body></html>"""
          Path("reports/mutation-report.html").write_text(report, encoding="utf-8")
          PY
      - name: Upload mutation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutation-test-results
          path: |
            reports/mutation-report.html
            reports/mutmut-results.xml
            reports/mutmut-run.log
            reports/mutmut-results.log
            reports/mutmut-counts.txt
            reports/mutants/
          if-no-files-found: warn

  # ─────────────────────────────────────────────────────────────
  # JOB 4B — C Mutation Testing (universalmutator)
  # Runs when: push/PR (always), or dispatch with c/all selected
  # ─────────────────────────────────────────────────────────────
  c_mutation:
    name: "4B · C Mutation Testing"
    runs-on: ubuntu-latest
    needs: c_tests
    continue-on-error: true
    if: >-
      ${{
        always() && (
          github.event_name != 'workflow_dispatch' ||
          inputs.mutation_languages == 'all' ||
          contains(inputs.mutation_languages, 'c')
        ) && (github.event_name != 'workflow_dispatch' || inputs.run_c_tests)
      }}
    outputs:
      killed: ${{ steps.metrics.outputs.killed }}
      survived: ${{ steps.metrics.outputs.survived }}
      total: ${{ steps.metrics.outputs.total }}
      score: ${{ steps.metrics.outputs.score }}
    steps:
      - name: Checkout repository (manual run)
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_branch }}
          fetch-depth: 1
      - name: Checkout repository (push / PR)
        if: ${{ github.event_name != 'workflow_dispatch' }}
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y gcc make
          pip install universalmutator
      - name: Run C mutation testing
        id: metrics
        shell: bash
        run: |
          set +e
          mkdir -p reports/c-mutants
          LOG="reports/c-mutation.log"
          : > "$LOG"
          KILLED=0; SURVIVED=0; TOTAL=0
          SRC_FILES=$(find agent -type f -name '*.c' ! -name 'test_*.c' 2>/dev/null | sort)
          if [ -z "$SRC_FILES" ]; then
            echo "No C source files to mutate." | tee -a "$LOG"
          else
            for SRC in $SRC_FILES; do
              STEM=$(basename "$SRC" .c)
              DIR=$(dirname "$SRC")
              TEST_FILE="$DIR/test_${STEM}.c"
              if [ ! -f "$TEST_FILE" ]; then
                echo "SKIP (no test): $SRC" | tee -a "$LOG"
                continue
              fi
              MUTANT_DIR="reports/c-mutants/${STEM}"
              mkdir -p "$MUTANT_DIR"
              echo "========================================"  | tee -a "$LOG"
              echo "Mutating: $SRC  (test: $TEST_FILE)"      | tee -a "$LOG"
              mutate "$SRC" --mutantDir "$MUTANT_DIR" >> "$LOG" 2>&1 || true

              # Count mutants generated
              MUTANT_COUNT=$(find "$MUTANT_DIR" -name '*.c' | wc -l)
              echo "Generated $MUTANT_COUNT mutant(s)" | tee -a "$LOG"

              gcc -std=c11 -Wall -I"$DIR" -o /tmp/orig_c_test "$SRC" "$TEST_FILE" >> "$LOG" 2>&1
              if [ $? -ne 0 ]; then
                echo "BASELINE COMPILE FAIL — skip" | tee -a "$LOG"
                continue
              fi
              /tmp/orig_c_test >> "$LOG" 2>&1; BASELINE=$?
              echo "Baseline exit code: $BASELINE" | tee -a "$LOG"

              for MUTANT in "$MUTANT_DIR"/*.c; do
                [ -f "$MUTANT" ] || continue
                TOTAL=$((TOTAL + 1))
                MID=$(basename "$MUTANT" .c)
                gcc -std=c11 -Wall -I"$DIR" -o /tmp/mut_c_test "$MUTANT" "$TEST_FILE" >> "$LOG" 2>&1
                if [ $? -ne 0 ]; then
                  KILLED=$((KILLED + 1))
                  echo "[KILLED-COMPILE] $MID" | tee -a "$LOG"
                  continue
                fi
                /tmp/mut_c_test >> "$LOG" 2>&1; RUN_EXIT=$?
                if [ "$RUN_EXIT" -ne "$BASELINE" ]; then
                  KILLED=$((KILLED + 1))
                  echo "[KILLED] $MID (exit $RUN_EXIT vs baseline $BASELINE)" | tee -a "$LOG"
                else
                  SURVIVED=$((SURVIVED + 1))
                  echo "[SURVIVED] $MID" | tee -a "$LOG"
                  diff "$SRC" "$MUTANT" > "$MUTANT_DIR/${MID}.diff" 2>/dev/null || true
                fi
              done
            done
          fi
          SCORE=$(python3 -c "print(round($KILLED/$TOTAL*100,2) if $TOTAL>0 else 0.0)" 2>/dev/null || echo 0)
          echo "C mutation — killed=$KILLED survived=$SURVIVED total=$TOTAL score=$SCORE%" | tee -a "$LOG"
          {
            echo "killed=$KILLED"
            echo "survived=$SURVIVED"
            echo "total=$TOTAL"
            echo "score=$SCORE"
          } >> "$GITHUB_OUTPUT"
          set -e

      - name: Generate C mutation HTML report
        run: |
          python3 - <<'PY'
          import html
          from pathlib import Path
          log = Path("reports/c-mutation.log")
          content = log.read_text(errors="ignore") if log.exists() else "No log."
          diffs = sorted(Path("reports/c-mutants").rglob("*.diff")) if Path("reports/c-mutants").exists() else []
          rows = "".join(
              f"<details><summary>{html.escape(d.name)}</summary>"
              f"<pre>{html.escape(d.read_text(errors='ignore'))}</pre></details>"
              for d in diffs
          ) or "<p>No surviving C mutants &#10003;</p>"
          Path("reports/c-mutation-report.html").write_text(
              "<!DOCTYPE html><html><head><meta charset='utf-8'><title>C Mutation</title>"
              "<style>body{font-family:Arial,sans-serif;margin:24px}"
              "pre{background:#111827;color:#f9fafb;padding:16px;border-radius:8px;white-space:pre-wrap}"
              "details{margin:8px 0;border:1px solid #d1d5db;border-radius:6px;padding:4px 12px}"
              "summary{cursor:pointer;font-weight:600}</style></head><body>"
              "<h1>C Mutation Testing Report</h1>"
              f"<h2>Log</h2><pre>{html.escape(content)}</pre>"
              f"<h2>Surviving mutant diffs</h2>{rows}</body></html>",
              encoding="utf-8"
          )
          PY
      - name: Upload C mutation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: c-mutation-results
          path: |
            reports/c-mutation-report.html
            reports/c-mutation.log
            reports/c-mutants/
          if-no-files-found: warn

  # ─────────────────────────────────────────────────────────────
  # JOB 4C — C++ Mutation Testing (universalmutator)
  # Runs when: push/PR (always), or dispatch with cpp/all selected
  # ─────────────────────────────────────────────────────────────
  cpp_mutation:
    name: "4C · C++ Mutation Testing"
    runs-on: ubuntu-latest
    needs: cpp_tests
    continue-on-error: true
    if: >-
      ${{
        always() && (
          github.event_name != 'workflow_dispatch' ||
          inputs.mutation_languages == 'all' ||
          contains(inputs.mutation_languages, 'cpp')
        ) && (github.event_name != 'workflow_dispatch' || inputs.run_cpp_tests)
      }}
    outputs:
      killed: ${{ steps.metrics.outputs.killed }}
      survived: ${{ steps.metrics.outputs.survived }}
      total: ${{ steps.metrics.outputs.total }}
      score: ${{ steps.metrics.outputs.score }}
    steps:
      - name: Checkout repository (manual run)
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_branch }}
          fetch-depth: 1
      - name: Checkout repository (push / PR)
        if: ${{ github.event_name != 'workflow_dispatch' }}
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y g++ make
          pip install universalmutator
      - name: Run C++ mutation testing
        id: metrics
        shell: bash
        run: |
          set +e
          mkdir -p reports/cpp-mutants
          LOG="reports/cpp-mutation.log"
          : > "$LOG"
          KILLED=0; SURVIVED=0; TOTAL=0
          SRC_FILES=$(find agent -type f \( -name '*.cpp' -o -name '*.cc' \) \
            ! -name 'test_*' 2>/dev/null | sort)
          if [ -z "$SRC_FILES" ]; then
            echo "No C++ source files to mutate." | tee -a "$LOG"
          else
            for SRC in $SRC_FILES; do
              STEM_FULL=$(basename "$SRC"); STEM="${STEM_FULL%.*}"; EXT="${STEM_FULL##*.}"
              DIR=$(dirname "$SRC")
              TEST_FILE=""
              for TRY in "$DIR/test_${STEM}.cpp" "$DIR/test_${STEM}.cc"; do
                [ -f "$TRY" ] && TEST_FILE="$TRY" && break
              done
              if [ -z "$TEST_FILE" ]; then
                echo "SKIP (no test): $SRC" | tee -a "$LOG"
                continue
              fi
              MUTANT_DIR="reports/cpp-mutants/${STEM}"
              mkdir -p "$MUTANT_DIR"
              echo "========================================"  | tee -a "$LOG"
              echo "Mutating: $SRC  (test: $TEST_FILE)"      | tee -a "$LOG"
              mutate "$SRC" --mutantDir "$MUTANT_DIR" >> "$LOG" 2>&1 || true

              MUTANT_COUNT=$(find "$MUTANT_DIR" \( -name '*.cpp' -o -name '*.cc' \) | wc -l)
              echo "Generated $MUTANT_COUNT mutant(s)" | tee -a "$LOG"

              g++ -std=c++17 -Wall -I"$DIR" -o /tmp/orig_cpp_test "$SRC" "$TEST_FILE" >> "$LOG" 2>&1
              if [ $? -ne 0 ]; then
                echo "BASELINE COMPILE FAIL — skip" | tee -a "$LOG"
                continue
              fi
              /tmp/orig_cpp_test >> "$LOG" 2>&1; BASELINE=$?
              echo "Baseline exit code: $BASELINE" | tee -a "$LOG"

              for MUTANT in "$MUTANT_DIR"/*.cpp "$MUTANT_DIR"/*.cc; do
                [ -f "$MUTANT" ] || continue
                TOTAL=$((TOTAL + 1))
                MID_FULL=$(basename "$MUTANT"); MID="${MID_FULL%.*}"
                g++ -std=c++17 -Wall -I"$DIR" -o /tmp/mut_cpp_test "$MUTANT" "$TEST_FILE" >> "$LOG" 2>&1
                if [ $? -ne 0 ]; then
                  KILLED=$((KILLED + 1))
                  echo "[KILLED-COMPILE] $MID" | tee -a "$LOG"
                  continue
                fi
                /tmp/mut_cpp_test >> "$LOG" 2>&1; RUN_EXIT=$?
                if [ "$RUN_EXIT" -ne "$BASELINE" ]; then
                  KILLED=$((KILLED + 1))
                  echo "[KILLED] $MID (exit $RUN_EXIT vs baseline $BASELINE)" | tee -a "$LOG"
                else
                  SURVIVED=$((SURVIVED + 1))
                  echo "[SURVIVED] $MID" | tee -a "$LOG"
                  diff "$SRC" "$MUTANT" > "$MUTANT_DIR/${MID}.diff" 2>/dev/null || true
                fi
              done
            done
          fi
          SCORE=$(python3 -c "print(round($KILLED/$TOTAL*100,2) if $TOTAL>0 else 0.0)" 2>/dev/null || echo 0)
          echo "C++ mutation — killed=$KILLED survived=$SURVIVED total=$TOTAL score=$SCORE%" | tee -a "$LOG"
          {
            echo "killed=$KILLED"
            echo "survived=$SURVIVED"
            echo "total=$TOTAL"
            echo "score=$SCORE"
          } >> "$GITHUB_OUTPUT"
          set -e

      - name: Generate C++ mutation HTML report
        run: |
          python3 - <<'PY'
          import html
          from pathlib import Path
          log = Path("reports/cpp-mutation.log")
          content = log.read_text(errors="ignore") if log.exists() else "No log."
          diffs = sorted(Path("reports/cpp-mutants").rglob("*.diff")) if Path("reports/cpp-mutants").exists() else []
          rows = "".join(
              f"<details><summary>{html.escape(d.name)}</summary>"
              f"<pre>{html.escape(d.read_text(errors='ignore'))}</pre></details>"
              for d in diffs
          ) or "<p>No surviving C++ mutants &#10003;</p>"
          Path("reports/cpp-mutation-report.html").write_text(
              "<!DOCTYPE html><html><head><meta charset='utf-8'><title>C++ Mutation</title>"
              "<style>body{font-family:Arial,sans-serif;margin:24px}"
              "pre{background:#111827;color:#f9fafb;padding:16px;border-radius:8px;white-space:pre-wrap}"
              "details{margin:8px 0;border:1px solid #d1d5db;border-radius:6px;padding:4px 12px}"
              "summary{cursor:pointer;font-weight:600}</style></head><body>"
              "<h1>C++ Mutation Testing Report</h1>"
              f"<h2>Log</h2><pre>{html.escape(content)}</pre>"
              f"<h2>Surviving mutant diffs</h2>{rows}</body></html>",
              encoding="utf-8"
          )
          PY
      - name: Upload C++ mutation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cpp-mutation-results
          path: |
            reports/cpp-mutation-report.html
            reports/cpp-mutation.log
            reports/cpp-mutants/
          if-no-files-found: warn

  # ─────────────────────────────────────────────────────────────
  # JOB 5 — Push metrics to Grafana + upload ci-metrics.json
  # ─────────────────────────────────────────────────────────────
  grafana_push:
    name: "5 · Push Metrics to Grafana"
    runs-on: ubuntu-latest
    if: always()
    needs:
      - unit_tests
      - mutation_tests
      - c_tests
      - cpp_tests
      - c_mutation
      - cpp_mutation
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install requests
        run: pip install requests
      - name: Build ci-metrics.json
        run: |
          mkdir -p reports
          python - <<'PY'
          import json, os, time
          from pathlib import Path
          metrics = {
              "run_id":       os.environ["GH_RUN_ID"],
              "repo":         os.environ["GH_REPO"],
              "branch":       os.environ["GH_BRANCH"],
              "sha":          os.environ["GH_SHA"],
              "timestamp":    int(time.time()),
              "unit": {
                  "total":   int(os.environ["UT_TOTAL"]),
                  "passed":  int(os.environ["UT_PASSED"]),
                  "failed":  int(os.environ["UT_FAILED"]),
                  "errors":  int(os.environ["UT_ERRORS"]),
                  "skipped": int(os.environ["UT_SKIPPED"]),
              },
              "mutation": {
                  "killed":   int(os.environ["MUT_KILLED"]),
                  "survived": int(os.environ["MUT_SURVIVED"]),
                  "timeout":  int(os.environ["MUT_TIMEOUT"]),
                  "total":    int(os.environ["MUT_TOTAL"]),
                  "score":    float(os.environ["MUT_SCORE"] or 0),
              },
              "c": {
                  "files":        int(os.environ["C_FILES"]),
                  "compile_pass": int(os.environ["C_COMPILE_PASS"]),
                  "compile_fail": int(os.environ["C_COMPILE_FAIL"]),
                  "run_pass":     int(os.environ["C_RUN_PASS"]),
                  "run_fail":     int(os.environ["C_RUN_FAIL"]),
                  "mut_killed":   int(os.environ["C_MUT_KILLED"]),
                  "mut_survived": int(os.environ["C_MUT_SURVIVED"]),
                  "mut_total":    int(os.environ["C_MUT_TOTAL"]),
                  "mut_score":    float(os.environ["C_MUT_SCORE"] or 0),
              },
              "cpp": {
                  "files":        int(os.environ["CPP_FILES"]),
                  "compile_pass": int(os.environ["CPP_COMPILE_PASS"]),
                  "compile_fail": int(os.environ["CPP_COMPILE_FAIL"]),
                  "run_pass":     int(os.environ["CPP_RUN_PASS"]),
                  "run_fail":     int(os.environ["CPP_RUN_FAIL"]),
                  "mut_killed":   int(os.environ["CPP_MUT_KILLED"]),
                  "mut_survived": int(os.environ["CPP_MUT_SURVIVED"]),
                  "mut_total":    int(os.environ["CPP_MUT_TOTAL"]),
                  "mut_score":    float(os.environ["CPP_MUT_SCORE"] or 0),
              },
          }
          Path("reports/ci-metrics.json").write_text(
              json.dumps(metrics, indent=2), encoding="utf-8"
          )
          print(json.dumps(metrics, indent=2))
          PY
        env:
          UT_TOTAL:          ${{ needs.unit_tests.outputs.total    || '0' }}
          UT_PASSED:         ${{ needs.unit_tests.outputs.passed   || '0' }}
          UT_FAILED:         ${{ needs.unit_tests.outputs.failed   || '0' }}
          UT_ERRORS:         ${{ needs.unit_tests.outputs.errors   || '0' }}
          UT_SKIPPED:        ${{ needs.unit_tests.outputs.skipped  || '0' }}
          MUT_KILLED:        ${{ needs.mutation_tests.outputs.killed        || '0' }}
          MUT_SURVIVED:      ${{ needs.mutation_tests.outputs.survived      || '0' }}
          MUT_TIMEOUT:       ${{ needs.mutation_tests.outputs.timeout       || '0' }}
          MUT_TOTAL:         ${{ needs.mutation_tests.outputs.total_mutants || '0' }}
          MUT_SCORE:         ${{ needs.mutation_tests.outputs.mutation_score || '0' }}
          C_FILES:           ${{ needs.c_tests.outputs.files        || '0' }}
          C_COMPILE_PASS:    ${{ needs.c_tests.outputs.compile_pass || '0' }}
          C_COMPILE_FAIL:    ${{ needs.c_tests.outputs.compile_fail || '0' }}
          C_RUN_PASS:        ${{ needs.c_tests.outputs.run_pass     || '0' }}
          C_RUN_FAIL:        ${{ needs.c_tests.outputs.run_fail     || '0' }}
          C_MUT_KILLED:      ${{ needs.c_mutation.outputs.killed    || '0' }}
          C_MUT_SURVIVED:    ${{ needs.c_mutation.outputs.survived  || '0' }}
          C_MUT_TOTAL:       ${{ needs.c_mutation.outputs.total     || '0' }}
          C_MUT_SCORE:       ${{ needs.c_mutation.outputs.score     || '0' }}
          CPP_FILES:         ${{ needs.cpp_tests.outputs.files        || '0' }}
          CPP_COMPILE_PASS:  ${{ needs.cpp_tests.outputs.compile_pass || '0' }}
          CPP_COMPILE_FAIL:  ${{ needs.cpp_tests.outputs.compile_fail || '0' }}
          CPP_RUN_PASS:      ${{ needs.cpp_tests.outputs.run_pass     || '0' }}
          CPP_RUN_FAIL:      ${{ needs.cpp_tests.outputs.run_fail     || '0' }}
          CPP_MUT_KILLED:    ${{ needs.cpp_mutation.outputs.killed    || '0' }}
          CPP_MUT_SURVIVED:  ${{ needs.cpp_mutation.outputs.survived  || '0' }}
          CPP_MUT_TOTAL:     ${{ needs.cpp_mutation.outputs.total     || '0' }}
          CPP_MUT_SCORE:     ${{ needs.cpp_mutation.outputs.score     || '0' }}
          GH_REPO:           ${{ github.repository }}
          GH_BRANCH:         ${{ github.ref_name }}
          GH_SHA:            ${{ github.sha }}
          GH_RUN_ID:         ${{ github.run_id }}
      - name: Upload ci-metrics artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-metrics
          path: reports/ci-metrics.json
          if-no-files-found: error
      - name: Push to Grafana annotations + Prometheus push-gateway
        env:
          GRAFANA_URL:      ${{ env.GRAFANA_URL }}
          GRAFANA_USER:     ${{ env.GRAFANA_USER }}
          GRAFANA_PASSWORD: ${{ env.GRAFANA_PASSWORD }}
          PUSHGATEWAY_URL:  ${{ secrets.PUSHGATEWAY_URL }}
        run: |
          python - <<'PY'
          import json, os, time, requests
          from pathlib import Path
          metrics = json.loads(Path("reports/ci-metrics.json").read_text())
          grafana_url = os.environ["GRAFANA_URL"].rstrip("/")
          auth        = (os.environ["GRAFANA_USER"], os.environ["GRAFANA_PASSWORD"])
          now_ms      = int(time.time() * 1000)

          def annotate(text, tags):
              try:
                  r = requests.post(
                      f"{grafana_url}/api/annotations",
                      auth=auth,
                      json={"time": now_ms, "tags": tags, "text": text},
                      timeout=10,
                  )
                  print(f"[annotation] {r.status_code} — {r.text[:120]}")
              except Exception as e:
                  print(f"[annotation] ERROR: {e}")

          annotate(
              text=(
                  f"<b>CI Run</b> · {metrics['repo']} @ {metrics['branch']}"
                  f" ({metrics['sha'][:8]}) · run {metrics['run_id']}<br>"
                  f"Unit: {metrics['unit']['passed']}/{metrics['unit']['total']} passed<br>"
                  f"Python mutation score: {metrics['mutation']['score']}%"
                  f" (killed {metrics['mutation']['killed']},"
                  f" survived {metrics['mutation']['survived']})<br>"
                  f"C mutation score: {metrics['c']['mut_score']}%"
                  f" (killed {metrics['c']['mut_killed']},"
                  f" survived {metrics['c']['mut_survived']})<br>"
                  f"C++ mutation score: {metrics['cpp']['mut_score']}%"
                  f" (killed {metrics['cpp']['mut_killed']},"
                  f" survived {metrics['cpp']['mut_survived']})<br>"
                  f"C: {metrics['c']['run_pass']} pass / {metrics['c']['run_fail']} fail<br>"
                  f"C++: {metrics['cpp']['run_pass']} pass / {metrics['cpp']['run_fail']} fail"
              ),
              tags=["ci", "mutation", metrics["branch"], metrics["repo"].replace("/", "-")],
          )

          flat_metrics = {
              "unit_passed":      metrics["unit"]["passed"],
              "unit_failed":      metrics["unit"]["failed"],
              "mut_score":        metrics["mutation"]["score"],
              "mut_killed":       metrics["mutation"]["killed"],
              "mut_survived":     metrics["mutation"]["survived"],
              "c_run_pass":       metrics["c"]["run_pass"],
              "c_run_fail":       metrics["c"]["run_fail"],
              "c_mut_score":      metrics["c"]["mut_score"],
              "c_mut_killed":     metrics["c"]["mut_killed"],
              "c_mut_survived":   metrics["c"]["mut_survived"],
              "cpp_run_pass":     metrics["cpp"]["run_pass"],
              "cpp_run_fail":     metrics["cpp"]["run_fail"],
              "cpp_mut_score":    metrics["cpp"]["mut_score"],
              "cpp_mut_killed":   metrics["cpp"]["mut_killed"],
              "cpp_mut_survived": metrics["cpp"]["mut_survived"],
          }
          tag_map = {
              "unit_passed":      "unit-tests",
              "unit_failed":      "unit-tests",
              "mut_score":        "mutation",
              "mut_killed":       "mutation",
              "mut_survived":     "mutation",
              "c_run_pass":       "c-tests",
              "c_run_fail":       "c-tests",
              "c_mut_score":      "c-mutation",
              "c_mut_killed":     "c-mutation",
              "c_mut_survived":   "c-mutation",
              "cpp_run_pass":     "cpp-tests",
              "cpp_run_fail":     "cpp-tests",
              "cpp_mut_score":    "cpp-mutation",
              "cpp_mut_killed":   "cpp-mutation",
              "cpp_mut_survived": "cpp-mutation",
          }
          for name, value in flat_metrics.items():
              annotate(
                  text=f"{name}={value}",
                  tags=["ci-metric", tag_map[name], metrics["branch"]],
              )

          pushgateway = os.environ.get("PUSHGATEWAY_URL", "")
          if pushgateway:
              job_label = f'repo="{metrics["repo"]}",branch="{metrics["branch"]}"'
              lines = []
              for name, value in flat_metrics.items():
                  mn = f"ci_{name}"
                  lines.append(f"# TYPE {mn} gauge")
                  lines.append(f'{mn}{{{job_label}}} {value}')
              try:
                  r = requests.post(
                      f"{pushgateway.rstrip('/')}/metrics/job/ci_pipeline",
                      data="\n".join(lines) + "\n",
                      headers={"Content-Type": "text/plain"},
                      timeout=10,
                  )
                  print(f"[pushgateway] {r.status_code} — {r.text[:120]}")
              except Exception as e:
                  print(f"[pushgateway] ERROR: {e}")
          print("Grafana push complete.")
          PY
