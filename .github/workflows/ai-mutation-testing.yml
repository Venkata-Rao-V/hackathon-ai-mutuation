name: AI Mutation Testing CI

run-name: "AI Mutation Testing - ${{ github.event_name == 'workflow_dispatch' && format('manual-{0}', inputs.target_branch) || github.ref_name }}"

on:
  push:
    branches:
      - main
      - develop
      - feature/**
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      target_branch:
        description: "Branch to run"
        required: true
        type: choice
        default: main
        options:
          - main
          - develop

env:
  PYTHON_VERSION: "3.11"
  SERVICE_URL: "http://127.0.0.1:8000"
  GRAFANA_URL: "http://127.0.0.1:3000"
  GRAFANA_USER: "admin"
  GRAFANA_PASSWORD: "admin"

permissions:
  contents: read

jobs:
  # ─────────────────────────────────────────────────────────────
  # JOB 1 — Lint & Static Analysis
  # ─────────────────────────────────────────────────────────────
  lint:
    name: "1 · Lint & Static Analysis"
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout repository (manual run)
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_branch }}
          fetch-depth: 1

      - name: Checkout repository (push / PR)
        if: ${{ github.event_name != 'workflow_dispatch' }}
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Debug trigger
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "ref_name=${{ github.ref_name }}"
          echo "head_ref=${{ github.head_ref }}"
          echo "target_branch=${{ github.event_name == 'workflow_dispatch' && inputs.target_branch || 'auto' }}"

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install lint tools
        run: |
          pip install flake8 flake8-bugbear flake8-html

      - name: Generate flake8 HTML report (non-blocking)
        run: |
          mkdir -p reports/flake8-html
          flake8 agent/services/ agent/*.py run_all.py \
            --max-line-length=120 \
            --extend-ignore=E203,W503,E501,W293,E261,E302,E305,E201,E202,F401,B007,E127 \
            --format=html \
            --htmldir=reports/flake8-html \
            --statistics || true

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flake8-html
          path: reports/flake8-html/
          if-no-files-found: warn

  # ─────────────────────────────────────────────────────────────
  # JOB 2 — Python Unit Tests
  # ─────────────────────────────────────────────────────────────
  unit-tests:
    name: "2 · Python Unit Tests"
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout repository (manual run)
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_branch }}
          fetch-depth: 1

      - name: Checkout repository (push / PR)
        if: ${{ github.event_name != 'workflow_dispatch' }}
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest-html

      - name: Create reports directory
        run: mkdir -p reports

      - name: Run pytest and generate HTML report
        working-directory: agent
        run: |
          pytest \
            -v \
            --tb=short \
            --junitxml=../reports/pytest-results.xml \
            --html=../reports/pytest-report.html \
            --self-contained-html \
            --no-header

      - name: Upload pytest report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-report
          path: |
            reports/pytest-report.html
            reports/pytest-results.xml
          if-no-files-found: warn

  # ─────────────────────────────────────────────────────────────
  # JOB 3 — C / C++ Compile & Test (separate steps)
  # ─────────────────────────────────────────────────────────────
  cpp-tests:
    name: "3 · C / C++ Compile & Test"
    runs-on: ubuntu-latest
    needs: lint
    continue-on-error: true

    steps:
      - name: Checkout repository (manual run)
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_branch }}
          fetch-depth: 1

      - name: Checkout repository (push / PR)
        if: ${{ github.event_name != 'workflow_dispatch' }}
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y g++ gcc make

      - name: Create reports directory
        run: mkdir -p reports

      # ==========================================================
      # C++ STEP
      # ==========================================================
      - name: Compile and test C++ files
        working-directory: agent
        shell: bash
        run: |
          set +e
          shopt -s nullglob

          LOG="../reports/cpp-build.log"
          : > "$LOG"

          cpp_files=( *.cpp )

          if [ ${#cpp_files[@]} -eq 0 ]; then
            echo "No C++ files found in agent/" | tee -a "$LOG"
            exit 0
          fi

          compile_cpp() {
            local file="$1"
            local base="${file%.*}"

            if grep -Eq '^[[:space:]]*int[[:space:]]+main[[:space:]]*\(' "$file"; then
              echo "Compiling C++ executable: $file" | tee -a "$LOG"
              g++ -std=c++17 -Wall -o "$base" "$file" >> "$LOG" 2>&1

              if [ $? -eq 0 ]; then
                echo "Running C++ executable: ./$base" | tee -a "$LOG"
                "./$base" >> "$LOG" 2>&1
              else
                echo "C++ compile failed: $file" | tee -a "$LOG"
              fi
            else
              echo "No main() in $file — compiling as C++ object only" | tee -a "$LOG"
              g++ -std=c++17 -Wall -c "$file" -o "${base}.o" >> "$LOG" 2>&1
            fi
          }

          for file in "${cpp_files[@]}"; do
            compile_cpp "$file"
          done

      - name: Generate C++ HTML report
        run: |
          python - <<'PY'
          import html
          from pathlib import Path

          log_path = Path("reports/cpp-build.log")
          content = log_path.read_text(encoding="utf-8", errors="ignore") if log_path.exists() else "No C++ build log found."

          report = f"""<!DOCTYPE html>
          <html>
          <head>
            <meta charset="utf-8">
            <title>C++ Build Report</title>
            <style>
              body {{ font-family: Arial, sans-serif; margin: 24px; }}
              pre {{
                background: #111827;
                color: #f9fafb;
                padding: 16px;
                border-radius: 8px;
                white-space: pre-wrap;
              }}
            </style>
          </head>
          <body>
            <h1>C++ Build & Test Report</h1>
            <pre>{html.escape(content)}</pre>
          </body>
          </html>"""

          Path("reports/cpp-report.html").write_text(report, encoding="utf-8")
          PY

      - name: Upload C++ report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cpp-report
          path: |
            reports/cpp-build.log
            reports/cpp-report.html
          if-no-files-found: warn

      # ==========================================================
      # C STEP
      # ==========================================================
      - name: Compile and test C files
        working-directory: agent
        shell: bash
        run: |
          set +e
          shopt -s nullglob

          LOG="../reports/c-build.log"
          : > "$LOG"

          c_files=( *.c )

          if [ ${#c_files[@]} -eq 0 ]; then
            echo "No C files found in agent/" | tee -a "$LOG"
            exit 0
          fi

          compile_c() {
            local file="$1"
            local base="${file%.*}"

            if grep -Eq '^[[:space:]]*int[[:space:]]+main[[:space:]]*\(' "$file"; then
              echo "Compiling C executable: $file" | tee -a "$LOG"
              gcc -Wall -o "$base" "$file" >> "$LOG" 2>&1

              if [ $? -eq 0 ]; then
                echo "Running C executable: ./$base" | tee -a "$LOG"
                "./$base" >> "$LOG" 2>&1
              else
                echo "C compile failed: $file" | tee -a "$LOG"
              fi
            else
              echo "No main() in $file — compiling as C object only" | tee -a "$LOG"
              gcc -Wall -c "$file" -o "${base}.o" >> "$LOG" 2>&1
            fi
          }

          for file in "${c_files[@]}"; do
            compile_c "$file"
          done

      - name: Generate C HTML report
        run: |
          python - <<'PY'
          import html
          from pathlib import Path

          log_path = Path("reports/c-build.log")
          content = log_path.read_text(encoding="utf-8", errors="ignore") if log_path.exists() else "No C build log found."

          report = f"""<!DOCTYPE html>
          <html>
          <head>
            <meta charset="utf-8">
            <title>C Build Report</title>
            <style>
              body {{ font-family: Arial, sans-serif; margin: 24px; }}
              pre {{
                background: #111827;
                color: #f9fafb;
                padding: 16px;
                border-radius: 8px;
                white-space: pre-wrap;
              }}
            </style>
          </head>
          <body>
            <h1>C Build & Test Report</h1>
            <pre>{html.escape(content)}</pre>
          </body>
          </html>"""

          Path("reports/c-report.html").write_text(report, encoding="utf-8")
          PY

      - name: Upload C report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: c-report
          path: |
            reports/c-build.log
            reports/c-report.html
          if-no-files-found: warn

  # ─────────────────────────────────────────────────────────────
  # JOB 4 — FastAPI Service Smoke Test
  # ─────────────────────────────────────────────────────────────
  api-service:
    name: "4 · FastAPI Service Health & Smoke"
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: Checkout repository (manual run)
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_branch }}
          fetch-depth: 1

      - name: Checkout repository (push / PR)
        if: ${{ github.event_name != 'workflow_dispatch' }}
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create reports directory
        run: mkdir -p reports

      - name: Start FastAPI service in background
        working-directory: agent/services
        run: |
          nohup python core_mutation_service.py > ../../reports/fastapi.log 2>&1 &
          echo "SERVICE_PID=$!" >> $GITHUB_ENV

      - name: Wait for service to be healthy
        run: |
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ env.SERVICE_URL }}/health" || true)
            if [ "$STATUS" = "200" ]; then
              echo "Service healthy after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Service did not start in time"
          cat reports/fastapi.log || true
          exit 1

      - name: Auto-discover source/test files for smoke test
        shell: bash
        run: |
          set -e
          SOURCE_FILE=$(find agent -maxdepth 1 -type f -name "*.py" ! -name "test_*" ! -name "run_agents.py" | sort | head -n 1)
          TEST_FILE=$(find agent -maxdepth 1 -type f -name "test_*.py" | sort | head -n 1)

          echo "SOURCE_FILE=$SOURCE_FILE" >> $GITHUB_ENV
          echo "TEST_FILE=$TEST_FILE" >> $GITHUB_ENV

          echo "Selected source: $SOURCE_FILE"
          echo "Selected test:   $TEST_FILE"

      - name: Smoke test POST /mutate
        run: |
          curl -s -X POST "${{ env.SERVICE_URL }}/mutate" \
            -H "Content-Type: application/json" \
            -d "{
              \"source_file\": \"${SOURCE_FILE}\",
              \"test_file\": \"${TEST_FILE}\",
              \"language\": \"python\"
            }" > reports/mutate-response.json

      - name: Smoke test GET /sessions
        run: |
          curl -s "${{ env.SERVICE_URL }}/sessions" > reports/sessions-response.json

      - name: Generate API HTML report
        run: |
          python - <<'PY'
          import json
          import html
          from pathlib import Path

          def read_text(path):
              p = Path(path)
              return p.read_text(encoding="utf-8", errors="ignore") if p.exists() else f"{path} not found"

          def read_json(path):
              p = Path(path)
              if not p.exists():
                  return {"error": f"{path} not found"}
              try:
                  return json.loads(p.read_text(encoding="utf-8"))
              except Exception as e:
                  return {"error": str(e)}

          mutate = read_json("reports/mutate-response.json")
          sessions = read_json("reports/sessions-response.json")
          fastapi_log = read_text("reports/fastapi.log")

          report = f"""<!DOCTYPE html>
          <html>
          <head>
            <meta charset="utf-8">
            <title>FastAPI Smoke Report</title>
            <style>
              body {{ font-family: Arial, sans-serif; margin: 24px; }}
              pre {{
                background: #111827;
                color: #f9fafb;
                padding: 16px;
                border-radius: 8px;
                white-space: pre-wrap;
              }}
            </style>
          </head>
          <body>
            <h1>FastAPI Smoke Test Report</h1>
            <h2>POST /mutate</h2>
            <pre>{html.escape(json.dumps(mutate, indent=2))}</pre>
            <h2>GET /sessions</h2>
            <pre>{html.escape(json.dumps(sessions, indent=2))}</pre>
            <h2>FastAPI Log</h2>
            <pre>{html.escape(fastapi_log)}</pre>
          </body>
          </html>"""

          Path("reports/api-report.html").write_text(report, encoding="utf-8")
          PY

      - name: Upload API report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-report
          path: |
            reports/api-report.html
            reports/fastapi.log
            reports/mutate-response.json
            reports/sessions-response.json
          if-no-files-found: warn

      - name: Terminate FastAPI service
        if: always()
        run: kill $SERVICE_PID || true

  # ─────────────────────────────────────────────────────────────
  # JOB 5 — Grafana Dashboard
  # ─────────────────────────────────────────────────────────────
  grafana-update:
    name: "5 · Grafana Dashboard"
    runs-on: ubuntu-latest
    needs: unit-tests
    continue-on-error: true

    steps:
      - name: Checkout repository (manual run)
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_branch }}
          fetch-depth: 1

      - name: Checkout repository (push / PR)
        if: ${{ github.event_name != 'workflow_dispatch' }}
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Create reports directory
        run: mkdir -p reports

      - name: Start Grafana container
        run: |
          docker run -d --name grafana \
            -p 3000:3000 \
            -e GF_SECURITY_ADMIN_USER=${{ env.GRAFANA_USER }} \
            -e GF_SECURITY_ADMIN_PASSWORD=${{ env.GRAFANA_PASSWORD }} \
            -e GF_AUTH_ANONYMOUS_ENABLED=true \
            -e GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer \
            -e GF_AUTH_DISABLE_LOGIN_FORM=true \
            grafana/grafana:latest

      - name: Wait for Grafana to be healthy
        run: |
          for i in $(seq 1 60); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ env.GRAFANA_URL }}/api/health" || true)
            if [ "$STATUS" = "200" ]; then
              echo "Grafana healthy after ${i}s"
              exit 0
            fi
            sleep 2
          done
          docker logs grafana || true
          exit 1

      - name: Create dashboard
        run: |
          cat > reports/grafana-dashboard.json <<'EOF'
          {
            "dashboard": {
              "id": null,
              "uid": "ai-mutation-dashboard",
              "title": "AI Mutation Testing Dashboard",
              "tags": ["ci", "mutation", "grafana"],
              "timezone": "browser",
              "schemaVersion": 39,
              "version": 1,
              "refresh": "10s",
              "panels": [
                {
                  "id": 1,
                  "type": "text",
                  "title": "Pipeline Overview",
                  "gridPos": { "h": 8, "w": 24, "x": 0, "y": 0 },
                  "options": {
                    "mode": "markdown",
                    "content": "## AI Mutation Testing CI\nDashboard created from GitHub Actions."
                  }
                }
              ]
            },
            "overwrite": true
          }
          EOF

          curl -s -u "${{ env.GRAFANA_USER }}:${{ env.GRAFANA_PASSWORD }}" \
            -H "Content-Type: application/json" \
            -X POST "${{ env.GRAFANA_URL }}/api/dashboards/db" \
            --data @reports/grafana-dashboard.json > /dev/null

      - name: Install Playwright
        run: |
          npm init -y >/dev/null 2>&1 || true
          npm install playwright >/dev/null 2>&1
          npx playwright install --with-deps chromium

      - name: Capture Grafana screenshot
        env:
          DASHBOARD_URL: "${{ env.GRAFANA_URL }}/d/ai-mutation-dashboard/ai-mutation-testing-dashboard?orgId=1&kiosk"
        run: |
          node - <<'NODE'
          const { chromium } = require('playwright');

          (async () => {
            const browser = await chromium.launch({ headless: true });
            const page = await browser.newPage({ viewport: { width: 1600, height: 1000 } });

            await page.goto(process.env.DASHBOARD_URL, {
              waitUntil: 'networkidle',
              timeout: 120000
            });

            await page.screenshot({
              path: 'reports/grafana-dashboard.png',
              fullPage: true
            });

            await browser.close();
          })();
          NODE

      - name: Generate Grafana HTML report
        run: |
          python - <<'PY'
          from pathlib import Path

          report = """<!DOCTYPE html>
          <html>
          <head>
            <meta charset="utf-8">
            <title>Grafana Dashboard</title>
            <style>
              body { font-family: Arial, sans-serif; margin: 24px; }
              img { max-width: 100%; border: 1px solid #d1d5db; border-radius: 8px; }
            </style>
          </head>
          <body>
            <h1>Grafana Dashboard</h1>
            <p>Captured during workflow execution.</p>
            <img src="grafana-dashboard.png" alt="Grafana Dashboard Screenshot">
          </body>
          </html>"""

          Path("reports/grafana-report.html").write_text(report, encoding="utf-8")
          PY

      - name: Upload Grafana report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: grafana-visuals
          path: |
            reports/grafana-report.html
            reports/grafana-dashboard.png
          if-no-files-found: warn

      - name: Stop Grafana container
        if: always()
        run: |
          docker stop grafana || true
          docker rm grafana || true

  # ─────────────────────────────────────────────────────────────
  # JOB 6 — Mutation Testing
  # ─────────────────────────────────────────────────────────────
  mutation-run:
    name: "6 · Mutation Testing (mutmut + AI Agents)"
    runs-on: ubuntu-latest
    needs:
      - unit-tests
      - cpp-tests

    steps:
      - name: Checkout repository (manual run)
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_branch }}
          fetch-depth: 1

      - name: Checkout repository (push / PR)
        if: ${{ github.event_name != 'workflow_dispatch' }}
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create reports directory
        run: mkdir -p reports

      - name: Run mutmut
        working-directory: agent
        run: |
          mutmut run \
            --paths-to-mutate . \
            --tests-dir . \
            --runner "python -m pytest" || true

      - name: Export mutmut HTML report
        working-directory: agent
        run: |
          mutmut html || true
          mkdir -p ../reports/mutmut-report
          cp -r html/* ../reports/mutmut-report/ || true

      - name: Save mutmut summary
        working-directory: agent
        run: |
          mutmut results > ../reports/mutmut-summary.txt || true

      - name: Run AI Agent pipeline
        working-directory: agent
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -n "$OPENAI_API_KEY" ]; then
            python run_agents.py
          else
            echo "OPENAI_API_KEY not set — skipping AI agent stage."
          fi

      - name: Generate mutation summary HTML
        run: |
          python - <<'PY'
          import html
          from pathlib import Path

          summary = Path("reports/mutmut-summary.txt").read_text(encoding="utf-8", errors="ignore") if Path("reports/mutmut-summary.txt").exists() else "No mutmut summary found."

          report = f"""<!DOCTYPE html>
          <html>
          <head>
            <meta charset="utf-8">
            <title>Mutation Summary</title>
            <style>
              body {{ font-family: Arial, sans-serif; margin: 24px; }}
              pre {{
                background: #111827;
                color: #f9fafb;
                padding: 16px;
                border-radius: 8px;
                white-space: pre-wrap;
              }}
            </style>
          </head>
          <body>
            <h1>Mutation Testing Summary</h1>
            <pre>{html.escape(summary)}</pre>
          </body>
          </html>"""

          Path("reports/mutation-summary.html").write_text(report, encoding="utf-8")
          PY

      - name: Upload mutation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutation-report
          path: |
            reports/mutation-summary.html
            reports/mutmut-summary.txt
            reports/mutmut-report/
          if-no-files-found: warn

  # ─────────────────────────────────────────────────────────────
  # JOB 7 — Full End-to-End Orchestration
  # ─────────────────────────────────────────────────────────────
  e2e-verify:
    name: "7 · Full E2E Orchestration (run_all.py)"
    runs-on: ubuntu-latest
    needs:
      - api-service
      - mutation-run
      - grafana-update
    if: always()

    steps:
      - name: Checkout repository (manual run)
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_branch }}
          fetch-depth: 1

      - name: Checkout repository (push / PR)
        if: ${{ github.event_name != 'workflow_dispatch' }}
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run full E2E orchestration
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python run_all.py

      - name: Upload E2E report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-report
          path: baseline-report.html
          if-no-files-found: warn

  # ─────────────────────────────────────────────────────────────
  # JOB 8 — Final Combined HTML Report
  # ─────────────────────────────────────────────────────────────
  report:
    name: "8 · Final HTML Report"
    runs-on: ubuntu-latest
    needs:
      - lint
      - unit-tests
      - cpp-tests
      - api-service
      - grafana-update
      - mutation-run
      - e2e-verify
    if: always()

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-reports

      - name: Build final HTML report
        run: |
          mkdir -p final-report/assets

